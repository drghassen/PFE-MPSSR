apiVersion: 1

datasources:
  - name: CloudSentinel PostgreSQL
    uid: cloudsentinel-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: cloudsentinel
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: cloudsentinel
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false

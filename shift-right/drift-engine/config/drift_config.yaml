engine:
  name: cloudsentinel-drift-engine
  version: 0.1.0
  ocsf_version: 1.3.0

azure:
  # Used only for optional validation/enrichment. Terraform itself authenticates via ARM_* env vars.
  subscription_id: ${ARM_SUBSCRIPTION_ID}
  tenant_id: ${ARM_TENANT_ID}
  validate_access: false
  list_resource_groups: false

terraform:
  working_dir: ${TF_WORKING_DIR:-.}
  workspace: ${TF_WORKSPACE:-default}
  init:
    upgrade: false
    reconfigure: false
    backend: true
  plan:
    lock_timeout: 60s
    parallelism: 10
    refresh_only: true

report:
  output_path: ${DRIFT_OUTPUT_PATH:-output/drift-report.json}
  include_plan_json: true
  include_raw_terraform_stdout: false
  template_path: templates/drift-report-template.j2

defectdojo:
  # Enable/disable inline DefectDojo upload from drift-engine itself.
  # In CI shift-right pipeline, upload is handled by a dedicated report job.
  enabled: ${DRIFT_PUSH_TO_DEFECTDOJO:-true}
  base_url: ${DEFECTDOJO_URL:-}
  api_key: ${DEFECTDOJO_API_KEY:-}
  engagement_id: ${DOJO_ENGAGEMENT_ID_RIGHT:-${DEFECTDOJO_ENGAGEMENT_ID_RIGHT:-}}
  test_title: CloudSentinel Drift Engine
  close_old_findings: true
  deduplication_on_engagement: true
  minimum_severity: Info

  # OPA Policy Decision Point (Shift-Right)
  # Uses port 8182 (opa-server-shiftright) — architecturally separated from
  # the shift-left OPA server (port 8181) which loads policies/opa/gate (cloudsentinel.gate).
opa:
  enabled: ${OPA_ENABLED:-true}
  server_url: ${OPA_SERVER_URL:-http://localhost:8182}
  policy_path: cloudsentinel.shiftright.drift
  timeout: 30
  fallback_on_error: true
  # Zero Trust: Bearer token for OPA server authentication.
  # Set OPA_AUTH_TOKEN as a masked CI variable or in .env locally.
  auth_token: ${OPA_AUTH_TOKEN:-}

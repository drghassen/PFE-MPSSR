vars:
  violation-tag: &violation-tag cs-violation

policies:
  - name: enforce-nsg-no-open-inbound
    resource: azure.networksecuritygroup
    description: |
      Detects Azure Network Security Groups that contain at least one inbound
      Allow rule with a wildcard source address (0.0.0.0/0, *, or Internet).

      An open inbound rule on a production NSG exposes VMs and services to the
      entire internet. This is one of the most common misconfigurations that
      leads to breaches.

      The filter uses a JMESPath expression to search the securityRules array
      for any rule where:
        direction == Inbound
        access    == Allow
        sourceAddressPrefix is one of: *, 0.0.0.0/0, Internet, Any

      Dry-run mode: reports matched NSGs, takes no action.
      Live mode:    tags the NSG with cs-violation=open-inbound-rule.

      Important — false positive risk:
        This filter will also match NSGs that have intentional public-facing
        rules (e.g. a load balancer NSG). Before enabling live remediation,
        add a tag-based exclusion filter:
          - not:
            - type: tagged
              tag: cs-open-inbound-approved
              value: "true"

      Next remediation step (not in this policy):
        Requires manual review per rule. Automated deletion of NSG rules
        carries high risk of service disruption and is intentionally
        left out of Phase 1.

    # ── Filters ───────────────────────────────────────────────────────────
    # We filter on the securityRules property using a JMESPath expression.
    # c7n evaluates the `key` field as a JMESPath path against the full
    # resource JSON. value_type: size + op: gt + value: 0 means "the
    # resulting array has at least one element".
    #
    # Note: Azure also has "effectiveSecurityRules" which includes inherited
    # rules from the subnet. This policy only checks explicitly defined rules
    # on the NSG itself (securityRules), not effective rules. Effective rule
    # scanning requires a separate network-watcher query and is out of scope.
    filters:
      - type: value
        key: "properties.securityRules[?properties.direction=='Inbound' && properties.access=='Allow' && (properties.sourceAddressPrefix=='*' || properties.sourceAddressPrefix=='0.0.0.0/0' || properties.sourceAddressPrefix=='Internet' || properties.sourceAddressPrefix=='Any')]"
        value_type: size
        op: gt
        value: 0

    actions:
      - type: tag
        tag: *violation-tag
        value: open-inbound-rule

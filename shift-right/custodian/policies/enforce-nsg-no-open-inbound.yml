policies:
  - name: enforce-nsg-no-open-inbound
    resource: azure.networksecuritygroup
    description: |
      Detects Azure Network Security Groups that contain at least one inbound
      Allow rule with a wildcard source address (*, 0.0.0.0/0, Internet, Any).

      An open inbound rule on a production NSG exposes VMs and services to the
      entire internet.  This is one of the most common misconfigurations that
      leads to breaches.

      Filter logic:
        1. NSGs tagged cs-open-inbound-approved=true are excluded — this covers
           intentional public-facing NSGs such as load balancers and application
           gateways that legitimately allow inbound traffic from the internet.
           Tag the NSG in Terraform/IaC to suppress the alert permanently.
        2. The remaining check uses JMESPath to find at least one inbound Allow
           rule with a wildcard source prefix.

      Hybrid operating model (Enterprise):
        - Cloud Custodian: detection + traceability tag only.
        - Azure Policy (DeployIfNotExists): enforces DenyAllInbound baseline rule.
        - Alerting/Ticketing: handled by CloudSentinel OPA + pipeline stages.

      Note on effective rules:
        Only explicitly defined securityRules are evaluated.  Inherited rules
        from a parent NSG or subnet (effectiveSecurityRules) require a separate
        Network Watcher query and are out of scope for this policy.

    # ── Filters ───────────────────────────────────────────────────────────────

    filters:
      # Exclude NSGs explicitly approved for open inbound traffic.
      # Tag the resource in IaC: cs-open-inbound-approved = "true"
      - not:
        - type: value
          key: "tags.cs-open-inbound-approved"
          value: "true"

      # Match NSGs with at least one inbound Allow rule using a wildcard source.
      - type: value
        key: "properties.securityRules[?properties.direction=='Inbound' && properties.access=='Allow' && (properties.sourceAddressPrefix=='*' || properties.sourceAddressPrefix=='0.0.0.0/0' || properties.sourceAddressPrefix=='Internet' || properties.sourceAddressPrefix=='Any')]"
        value_type: size
        op: gt
        value: 0

    # ── Actions ───────────────────────────────────────────────────────────────

    actions:
      - type: tag
        tag: cs-violation
        value: open-inbound-rule

Mutelist:
  Accounts:
    "*":
      Checks:
        iam_role_user_access_admin_restricted:
          Regions:
            - "*"
          Resources:
            - "c90a27b7-049c-4eca-ab7d-aa1d1d85aff4"
            - "befee0f8-7c4e-451f-96a2-b3657cb58be6"
          Tags:
            - "*"
        storage_ensure_encryption_with_customer_managed_keys:
          Regions:
            - "*"
          Resources:
            - "*"
          Tags:
            - "*"
        storage_ensure_private_endpoints_in_storage_accounts:
          Regions:
            - "*"
          Resources:
            - "*"
          Tags:
            - "*"
        storage_geo_redundant_enabled:
          Regions:
            - "*"
          Resources:
            - "*"
          Tags:
            - "*"
        storage_smb_channel_encryption_with_secure_algorithm:
          Regions:
            - "*"
          Resources:
            - "*"
          Tags:
            - "*"
        storage_infrastructure_encryption_is_enabled:
          Regions:
            - "*"
          Resources:
            - "*"
          Tags:
            - "*"
        network_watcher_enabled:
          Regions:
            - "*"
          Resources:
            - "*"
          Tags:
            - "*"
        network_bastion_host_exists:
          Regions:
            - "*"
          Resources:
            - "*"
          Tags:
            - "*"
        # JIT (Just-in-Time) VM access requires Microsoft Defender for Servers Plan 2,
        # a paid feature unavailable in Azure for Students subscription. Azure Bastion
        # (bas-csdemo-dev) is deployed and provides browser-based, audited SSH/RDP
        # access without any public port exposure — equivalent compensating control.
        vm_jit_access_enabled:
          Regions:
            - "*"
          Resources:
            - "vm-csdemo-app"
          Tags:
            - "*"
        # The VM uses Canonical Ubuntu 22.04 LTS Gen2 (approved publisher). An Azure
        # Compute Gallery with the matching image definition has been provisioned
        # (acg.csdemo.dev). Prowler requires a gallery image *version* to be present
        # (not just a definition), which requires a full Image Builder pipeline run
        # outside Terraform. This mute suppresses the finding until the first
        # hardened image version is published to the gallery.
        vm_ensure_using_approved_images:
          Regions:
            - "*"
          Resources:
            - "vm-csdemo-app"
          Tags:
            - "*"

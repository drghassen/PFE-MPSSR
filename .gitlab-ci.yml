# ============================================================================
# CloudSentinel - GitLab CI/CD
# Shift-Left scanners are advisory only. OPA is the single ALLOW/DENY gate.
# ============================================================================

default:
  tags:
    - cloudsentinel
    - docker

variables:
  GITLEAKS_VERSION: "8.21.2"
  CHECKOV_VERSION: "3.2.502"
  TRIVY_VERSION: "0.69.1"
  OPA_VERSION: "1.13.1"
  JSONSCHEMA_VERSION: "4.25.1"

  SCAN_TARGET: "infra/azure/student-secure"
  CHECKOV_SKIP_PATHS: "infra/azure/student-secure/tests,infra/azure/test/tests,tests/fixtures"
  TRIVY_TARGET: "infra/azure/student-secure"
  TRIVY_IMAGE_TARGET: "alpine:3.21"
  TRIVY_SKIP_DIRS: "infra/azure/student-secure/tests,infra/azure/test/tests,tests/fixtures"

  CRITICAL_MAX: "0"
  HIGH_MAX: "2"
  RETRY_GUARD_MAX_RETRIES: "3"
  RETRY_GUARD_MIN_INTERVAL_SEC: "120"
  APPSEC_ALLOWED_USERS: "appsec-bot,appsec-admin"

stages:
  - guard
  - prepare
  - scan
  - normalize
  - contract
  - decide
  - report
  - deploy

.default_tools: &default_tools
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:f2f6762e13c9517cc6c06cb1f632bed665761df7756c9b1ff6cc4204bee68cce"
  before_script: []
  cache:
    key: "cloudsentinel-tools"
    policy: pull-push
    paths:
      - .trivy-cache

retry-guard:
  <<: *default_tools
  stage: guard
  script:
    - chmod +x shift-left/ci/retry-guard.sh
    - bash shift-left/ci/retry-guard.sh
  allow_failure: false

policies-immutability:
  <<: *default_tools
  stage: guard
  script:
    - chmod +x shift-left/ci/enforce-policies-immutability.sh
    - bash shift-left/ci/enforce-policies-immutability.sh
  allow_failure: false


build-scan-tools-image:
  stage: prepare
  timeout: 2h
  image:
    name: "gcr.io/kaniko-project/executor@sha256:c3109d5926a997b100c4343944e06c6b30a6804b2f9abe0994d3de6ef92b028e"
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - >
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}'
      "$CI_REGISTRY" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/ci/images/scan-tools/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/scan-tools:${SCAN_TOOLS_BUILD_TAG:-1.0.0}"
      --build-arg "GITLEAKS_VERSION=${GITLEAKS_VERSION}"
      --build-arg "CHECKOV_VERSION=${CHECKOV_VERSION}"
      --build-arg "TRIVY_VERSION=${TRIVY_VERSION}"
      --build-arg "JSONSCHEMA_VERSION=${JSONSCHEMA_VERSION}"
      --snapshot-mode=redo
      --cache=true
      --cache-repo "${CI_REGISTRY_IMAGE}/cache/scan-tools"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
    - when: never

gitleaks-scan:
  <<: *default_tools
  stage: scan
  script:
    - gitleaks version
    - mkdir -p .cloudsentinel
    - export USE_BASELINE="false"
    - chmod +x shift-left/gitleaks/run-gitleaks.sh
    - bash shift-left/gitleaks/run-gitleaks.sh
    - chmod a+r .cloudsentinel/gitleaks_raw.json .cloudsentinel/gitleaks_opa.json 2>/dev/null || true
    - jq -r '"[scan-summary] gitleaks=" + ((.stats.TOTAL // 0) | tostring) + " has_findings=" + ((.has_findings // false) | tostring) + " state=" + (if (.status // "") == "NOT_RUN" then "NOT_RUN" else "OK" end)' .cloudsentinel/gitleaks_opa.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/gitleaks_raw.json
      - .cloudsentinel/gitleaks_opa.json

checkov-scan:
  <<: *default_tools
  stage: scan
  script:
    - checkov --version
    - mkdir -p .cloudsentinel
    - chmod +x shift-left/checkov/run-checkov.sh
    - bash shift-left/checkov/run-checkov.sh "${SCAN_TARGET}"
    - chmod a+r .cloudsentinel/checkov_raw.json .cloudsentinel/checkov_opa.json .cloudsentinel/checkov_scan.log 2>/dev/null || true
    - jq -r '"[scan-summary] checkov=" + ((.stats.TOTAL // 0) | tostring) + " has_findings=" + ((.has_findings // false) | tostring) + " state=" + (if (.status // "") == "NOT_RUN" then "NOT_RUN" else "OK" end)' .cloudsentinel/checkov_opa.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/checkov_raw.json
      - .cloudsentinel/checkov_opa.json
      - .cloudsentinel/checkov_scan.log

trivy-fs-scan:
  <<: *default_tools
  stage: scan
  script:
    - trivy --version
    - mkdir -p shift-left/trivy/reports/raw .cloudsentinel
    - chmod +x shift-left/trivy/scripts/run-trivy.sh
    - bash shift-left/trivy/scripts/run-trivy.sh "${TRIVY_TARGET}" "fs"
    - cp .cloudsentinel/trivy_opa.json .cloudsentinel/trivy_fs_opa.json
    - chmod -R a+r shift-left/trivy/reports/raw .cloudsentinel/trivy_fs_opa.json 2>/dev/null || true
    - jq -r '"[scan-summary] trivy-fs=" + ((.stats.TOTAL // 0) | tostring) + " state=" + (.status // "unknown")' .cloudsentinel/trivy_fs_opa.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/trivy-fs-raw.json
      - shift-left/trivy/reports/sbom/trivy-fs.cdx.json
      - .cloudsentinel/trivy_fs_opa.json

trivy-config-scan:
  <<: *default_tools
  stage: scan
  script:
    - trivy --version
    - mkdir -p shift-left/trivy/reports/raw .cloudsentinel
    - chmod +x shift-left/trivy/scripts/run-trivy.sh
    - bash shift-left/trivy/scripts/run-trivy.sh "${TRIVY_TARGET}" "config"
    - cp .cloudsentinel/trivy_opa.json .cloudsentinel/trivy_config_opa.json
    - chmod -R a+r shift-left/trivy/reports/raw .cloudsentinel/trivy_config_opa.json 2>/dev/null || true
    - jq -r '"[scan-summary] trivy-config=" + ((.stats.TOTAL // 0) | tostring) + " state=" + (.status // "unknown")' .cloudsentinel/trivy_config_opa.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/trivy-config-raw.json
      - .cloudsentinel/trivy_config_opa.json

trivy-image-scan:
  <<: *default_tools
  stage: scan
  script:
    - trivy --version
    - mkdir -p shift-left/trivy/reports/raw .cloudsentinel
    - chmod +x shift-left/trivy/scripts/run-trivy.sh
    - |
      if [ -z "${TRIVY_IMAGE_TARGET:-}" ]; then
        echo "[scan] TRIVY_IMAGE_TARGET is empty -> emitting NOT_RUN for image scan"
        bash shift-left/trivy/scripts/run-trivy.sh
      else
        bash shift-left/trivy/scripts/run-trivy.sh "${TRIVY_IMAGE_TARGET}" "image"
      fi
    - cp .cloudsentinel/trivy_opa.json .cloudsentinel/trivy_image_opa.json
    - chmod -R a+r shift-left/trivy/reports/raw .cloudsentinel/trivy_image_opa.json 2>/dev/null || true
    - jq -r '"[scan-summary] trivy-image=" + ((.stats.TOTAL // 0) | tostring) + " state=" + (.status // "unknown")' .cloudsentinel/trivy_image_opa.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/trivy-image-raw.json
      - shift-left/trivy/reports/sbom/trivy-image.cdx.json
      - .cloudsentinel/trivy_image_opa.json

normalize-reports:
  <<: *default_tools
  stage: normalize
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-fs-scan
      artifacts: true
    - job: trivy-config-scan
      artifacts: true
    - job: trivy-image-scan
      artifacts: true
  script:
    - |
      python3 - <<'PY'
      import json
      from pathlib import Path

      root = Path(".cloudsentinel")
      reports = {
          "fs": root / "trivy_fs_opa.json",
          "config": root / "trivy_config_opa.json",
          "image": root / "trivy_image_opa.json",
      }
      loaded = {}
      for name, path in reports.items():
          if not path.exists():
              loaded[name] = {"status": "NOT_RUN", "errors": [f"missing_report:{path}"], "findings": [], "stats": {"TOTAL": 0}}
              continue
          try:
              loaded[name] = json.loads(path.read_text(encoding="utf-8"))
          except Exception:
              loaded[name] = {"status": "NOT_RUN", "errors": [f"invalid_json:{path}"], "findings": [], "stats": {"TOTAL": 0}}

      any_not_run = any(str(r.get("status", "")).upper() == "NOT_RUN" for r in loaded.values())
      if any_not_run:
          errors = []
          for name, report in loaded.items():
              if str(report.get("status", "")).upper() == "NOT_RUN":
                  errs = report.get("errors", [])
                  if isinstance(errs, list):
                      errors.extend([f"{name}:{e}" for e in errs])
                  else:
                      errors.append(f"{name}:not_run")
          merged = {
              "tool": "trivy",
              "version": "multi",
              "status": "NOT_RUN",
              "errors": errors or ["trivy_subscan_not_run"],
              "has_findings": False,
              "stats": {
                  "CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0, "INFO": 0,
                  "TOTAL": 0, "EXEMPTED": 0, "FAILED": 0, "PASSED": 0,
                  "by_type": {"vulnerability": 0, "secret": 0, "misconfig": 0},
                  "by_category": {"INFRASTRUCTURE": 0, "APPLICATION": 0, "CONFIGURATION": 0, "SECRET": 0}
              },
              "findings": []
          }
      else:
          findings = []
          for report in loaded.values():
              findings.extend(report.get("findings", []))

          sev_keys = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "TOTAL", "EXEMPTED", "FAILED", "PASSED"]
          by_type_keys = ["vulnerability", "secret", "misconfig"]
          by_cat_keys = ["INFRASTRUCTURE", "APPLICATION", "CONFIGURATION", "SECRET"]
          stats = {k: 0 for k in sev_keys}
          by_type = {k: 0 for k in by_type_keys}
          by_cat = {k: 0 for k in by_cat_keys}
          for report in loaded.values():
              rstats = report.get("stats", {})
              for key in sev_keys:
                  stats[key] += int(rstats.get(key, 0) or 0)
              for key in by_type_keys:
                  by_type[key] += int((rstats.get("by_type", {}) or {}).get(key, 0) or 0)
              for key in by_cat_keys:
                  by_cat[key] += int((rstats.get("by_category", {}) or {}).get(key, 0) or 0)
          stats["by_type"] = by_type
          stats["by_category"] = by_cat

          merged = {
              "tool": "trivy",
              "version": "multi",
              "status": "OK",
              "errors": [],
              "has_findings": len(findings) > 0,
              "stats": stats,
              "findings": findings
          }

      (root / "trivy_opa.json").write_text(json.dumps(merged, indent=2), encoding="utf-8")
      print("[normalize] merged trivy subscans -> .cloudsentinel/trivy_opa.json")
      PY
    - chmod +x shift-left/normalizer/normalize.py
    - export ENVIRONMENT="${CI_ENVIRONMENT_NAME:-dev}"
    - export CLOUDSENTINEL_EXECUTION_MODE="ci"
    - export CLOUDSENTINEL_SCHEMA_STRICT="true"
    # Backward compatibility: allow either DOJO_* or DEFECTDOJO_* CI variable names.
    - export DOJO_URL="${DOJO_URL:-${DEFECTDOJO_URL:-}}"
    - export DOJO_API_KEY="${DOJO_API_KEY:-${DEFECTDOJO_API_KEY:-${DEFECTDOJO_API_TOKEN:-}}}"
    - python3 shift-left/normalizer/normalize.py
    - jq '.summary' .cloudsentinel/golden_report.json
    - jq '.quality_gate' .cloudsentinel/golden_report.json
    - timeout 30 python3 shift-left/opa/fetch-exceptions.py
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/golden_report.json
      - .cloudsentinel/gitleaks_opa.json
      - .cloudsentinel/checkov_opa.json
      - .cloudsentinel/trivy_opa.json
      - .cloudsentinel/trivy_fs_opa.json
      - .cloudsentinel/trivy_config_opa.json
      - .cloudsentinel/trivy_image_opa.json
      - .cloudsentinel/exceptions.json
      - .cloudsentinel/dropped_exceptions.json
      - .cloudsentinel/audit_events.jsonl

contract-test:
  <<: *default_tools
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - test -f .cloudsentinel/gitleaks_opa.json
    - test -f .cloudsentinel/checkov_opa.json
    - test -f .cloudsentinel/trivy_opa.json
    - test -f .cloudsentinel/golden_report.json
    - test -f .cloudsentinel/exceptions.json
    - |
      python3 - <<'PY'
      import json
      import sys

      reports = [
          ".cloudsentinel/gitleaks_opa.json",
          ".cloudsentinel/checkov_opa.json",
          ".cloudsentinel/trivy_opa.json",
      ]
      required = {"tool", "version", "status", "findings", "errors"}
      for path in reports:
          with open(path, "r", encoding="utf-8") as f:
              doc = json.load(f)
          missing = sorted(required.difference(doc.keys()))
          if missing:
              raise SystemExit(f"[contract] {path} missing fields: {missing}")
          if doc["status"] not in {"OK", "NOT_RUN"}:
              raise SystemExit(f"[contract] {path} invalid status: {doc['status']}")
          if not isinstance(doc["findings"], list):
              raise SystemExit(f"[contract] {path} findings must be array")
          if not isinstance(doc["errors"], list):
              raise SystemExit(f"[contract] {path} errors must be array")
      print("[contract] scanner wrapper contract passed")
      PY
    - |
      printf '%s\n' \
        'import json, sys' \
        'from jsonschema import validate, Draft7Validator' \
        'doc    = json.load(open(".cloudsentinel/golden_report.json"))' \
        'schema = json.load(open("shift-left/normalizer/schema/cloudsentinel_report.schema.json"))' \
        'Draft7Validator.check_schema(schema)' \
        'validate(doc, schema)' \
        'print("[contract] schema validation passed")' \
        > /tmp/contract_validate.py
      python3 /tmp/contract_validate.py
    - |
      printf '%s\n' \
        'import json, sys' \
        'from jsonschema import validate, Draft7Validator' \
        'doc    = json.load(open(".cloudsentinel/exceptions.json"))' \
        'schema = json.load(open("shift-left/opa/schema/exceptions_v2.schema.json"))' \
        'Draft7Validator.check_schema(schema)' \
        'validate(doc, schema)' \
        'print("[contract] exceptions schema validation passed")' \
        > /tmp/contract_validate_exceptions.py
      python3 /tmp/contract_validate_exceptions.py
    - python3 -m unittest discover -s shift-left/opa/tests -p "test_fetch_exceptions.py"
    - python3 -m unittest discover -s shift-left/normalizer/tests -p "test_normalize.py"
    - bash shift-left/checkov/tests/smoke.sh
    - bash shift-left/gitleaks/tests/smoke.sh
    - bash shift-left/normalizer/tests/smoke.sh
opa-image-smoke:
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:740ebf73adc25cd85b2a08615666b4e728812c0cc487760c6953ffe675ca78cd"
    entrypoint: [""]
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - mkdir -p .cloudsentinel
    - opa version
    - bash --version | head -n1
    - curl --version | head -n1
    - jq --version
    - git --version
    - |
      opa run --server --addr=127.0.0.1:8181 \
        --log-level=error \
        --set=decision_logs.console=true \
        policies/opa/pipeline_decision.rego \
        .cloudsentinel/exceptions.json \
        > .cloudsentinel/opa-image-smoke.log 2>&1 &
    - |
      for i in {1..10}; do
        if curl -sf "http://127.0.0.1:8181/health"; then
          echo "[smoke] OPA server is UP"; break;
        fi
        echo "[smoke] Waiting for OPA... ($i/10)"
        sleep 2
      done
    - curl -sf "http://127.0.0.1:8181/v1/policies" >/dev/null
  artifacts:
    when: on_failure
    expire_in: 7 days
    paths:
      - .cloudsentinel/opa-image-smoke.log

opa-decision:
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:740ebf73adc25cd85b2a08615666b4e728812c0cc487760c6953ffe675ca78cd"
    entrypoint: [""]
  stage: decide
  needs:
    - job: normalize-reports
      artifacts: true
    - job: contract-test
    - job: opa-image-smoke
  script:
    - opa test policies/opa -v
    - |
      opa run --server --addr=127.0.0.1:8181 \
        --log-level=info \
        --log-format=json \
        --set=decision_logs.console=true \
        policies/opa/pipeline_decision.rego \
        .cloudsentinel/exceptions.json \
        > /tmp/opa-server.log 2>&1 &
    - |
      for i in {1..10}; do
        if curl -sf "http://127.0.0.1:8181/health" >/dev/null; then
          echo "[opa] OPA server is UP"; break
        fi
        echo "[opa] Waiting for OPA... ($i/10)"
        sleep 2
      done
    - OPA_SERVER_URL="http://127.0.0.1:8181" bash shift-left/opa/run-opa.sh --enforce
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/opa_decision.json
      - .cloudsentinel/decision_audit_events.jsonl
      - .cloudsentinel/audit_events.jsonl

upload-to-defectdojo:
  stage: report
  image: "curlimages/curl@sha256:d9b4541e214bcd85196d6e92e2753ac6d0ea699f0af5741f8c6cccbfcf00ef4b"
  retry: 2
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-fs-scan
      artifacts: true
  script:
    - |
      DOJO_URL_EFF="${DOJO_URL:-${DEFECTDOJO_URL:-}}"
      DOJO_API_KEY_EFF="${DOJO_API_KEY:-${DEFECTDOJO_API_KEY:-${DEFECTDOJO_API_TOKEN:-}}}"
      DOJO_ENGAGEMENT_ID_EFF="${DOJO_ENGAGEMENT_ID:-${DEFECTDOJO_ENGAGEMENT_ID:-}}"

      if [ -z "${DOJO_URL_EFF}" ] || [ -z "${DOJO_API_KEY_EFF}" ] || [ -z "${DOJO_ENGAGEMENT_ID_EFF}" ]; then
        echo "[dojo] Missing Dojo vars. Accepted names:"
        echo "[dojo] URL: DOJO_URL or DEFECTDOJO_URL"
        echo "[dojo] API key: DOJO_API_KEY or DEFECTDOJO_API_KEY or DEFECTDOJO_API_TOKEN"
        echo "[dojo] Engagement: DOJO_ENGAGEMENT_ID or DEFECTDOJO_ENGAGEMENT_ID"
        echo "[dojo] Skipping upload."
        exit 0
      fi

      # Some scanners create artifacts with 600 permissions. Ensure readability for this job user.
      chmod -R a+r .cloudsentinel shift-left/trivy/reports/raw 2>/dev/null || true
      mkdir -p .cloudsentinel/dojo-responses

      upload_scan() {
        local file_path="$1"
        local scan_type="$2"
        local label="$3"
        local response_file=".cloudsentinel/dojo-responses/${label}.json"

        if [ ! -f "${file_path}" ]; then
          echo "[dojo] ${label}: report not found (${file_path}), skipping."
          return 0
        fi

        if [ ! -r "${file_path}" ]; then
          echo "[dojo] ${label}: report exists but is not readable (${file_path})."
          ls -l "${file_path}" || true
          return 1
        fi

        HTTP_CODE=$(curl -sS -o "${response_file}" -w "%{http_code}" \
          -X POST "${DOJO_URL_EFF}/api/v2/import-scan/" \
          -H "Authorization: Token ${DOJO_API_KEY_EFF}" \
          -F "file=@${file_path}" \
          -F "scan_type=${scan_type}" \
          --form-string "engagement=${DOJO_ENGAGEMENT_ID_EFF}" \
          --form-string "active=true" \
          --form-string "verified=true" \
          --form-string "close_old_findings=true" \
          --form-string "close_old_findings_product_scope=false" \
          --form-string "deduplication_on_engagement=true")

        if [ "${HTTP_CODE}" = "201" ]; then
          echo "[dojo] ${label} uploaded HTTP=201"
        else
          echo "[dojo] ${label} upload failed HTTP=${HTTP_CODE}"
          cat "${response_file}" || true
          return 1
        fi
      }

      upload_scan ".cloudsentinel/gitleaks_raw.json" "Gitleaks Scan" "Gitleaks"
      upload_scan ".cloudsentinel/checkov_raw.json" "Checkov Scan" "Checkov"
      upload_scan "shift-left/trivy/reports/raw/trivy-fs-raw.json" "Trivy Scan" "Trivy (FS/SCA)"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/dojo-responses/
  when: always
  allow_failure: false

deploy-security-gate:
  <<: *default_tools
  stage: deploy
  needs:
    - job: normalize-reports
      artifacts: true
    - job: opa-decision
      artifacts: true
  script:
    - chmod +x scripts/ci/enforce-zero-findings.sh
    - bash scripts/ci/enforce-zero-findings.sh .cloudsentinel/golden_report.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(main|develop)$/'

deploy-infrastructure:
  <<: *default_tools
  stage: deploy
  needs:
    - job: deploy-security-gate
      artifacts: true
  script:
    - |
      set -euo pipefail
      required_vars=(
        ARM_CLIENT_ID
        ARM_CLIENT_SECRET
        ARM_TENANT_ID
        ARM_SUBSCRIPTION_ID
        TFSTATE_RESOURCE_GROUP
        TFSTATE_STORAGE_ACCOUNT
        TFSTATE_CONTAINER
      )
      for name in "${required_vars[@]}"; do
        if [ -z "${!name:-}" ]; then
          echo "[deploy][ERROR] missing required variable: ${name}" >&2
          exit 2
        fi
      done
    - mkdir -p .cloudsentinel /tmp/terraform-bin
    - curl -fsSLo /tmp/terraform.zip "https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip"
    - |
      python3 - <<'PY'
      import stat
      import zipfile
      from pathlib import Path
      dst = Path("/tmp/terraform-bin")
      dst.mkdir(parents=True, exist_ok=True)
      with zipfile.ZipFile("/tmp/terraform.zip") as zf:
          zf.extractall(dst)
      tf = dst / "terraform"
      tf.chmod(tf.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)
      PY
    - export PATH="/tmp/terraform-bin:$PATH"
    - terraform version
    - |
      terraform -chdir=infra/azure/student-secure init -input=false \
        -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP}" \
        -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT}" \
        -backend-config="container_name=${TFSTATE_CONTAINER}" \
        -backend-config="key=${TFSTATE_KEY:-student-secure-${CI_COMMIT_REF_SLUG}.tfstate}" \
        -backend-config="use_azuread_auth=true"
    - terraform -chdir=infra/azure/student-secure plan -input=false -out=tfplan
    - terraform -chdir=infra/azure/student-secure apply -input=false -auto-approve tfplan
    - terraform -chdir=infra/azure/student-secure output -json > .cloudsentinel/terraform_outputs_student_secure.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/terraform_outputs_student_secure.json
      - infra/azure/student-secure/tfplan
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(main|develop)$/'

post-deploy-verify:
  <<: *default_tools
  stage: deploy
  needs:
    - job: deploy-infrastructure
      artifacts: true
  script:
    - chmod +x scripts/verify-student-secure.sh
    - chmod +x scripts/post-deploy-verify-student-secure.sh
    - bash scripts/post-deploy-verify-student-secure.sh infra/azure/student-secure "${TRIVY_IMAGE_TARGET}"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/golden_report.json
      - .cloudsentinel/opa_decision.json
      - .cloudsentinel/terraform_outputs_student_secure.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(main|develop)$/'

# workflow: controls which pipelines are created.
# Only MR events, main, and develop branches trigger the pipeline.
# Remove or restrict this block if you need manual triggers.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'


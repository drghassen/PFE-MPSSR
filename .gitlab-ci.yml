# ============================================================================
# CloudSentinel - GitLab CI/CD
# Shift-Left scanners are advisory only. OPA is the single ALLOW/DENY gate.
# ============================================================================

default:
  tags:
    - cloudsentinel
    - docker

variables:
  SECURITY_TOOLS_IMAGE: "$CI_REGISTRY_IMAGE/scan-tools:1.0.0"
  # Base images pinned by tag; override with digests via *_IMAGE_DIGEST in CI settings.
  CURL_IMAGE_DIGEST: "curlimages/curl:8.12.1"
  # Recommended: override with immutable digest in CI/CD settings.
  # Example: $CI_REGISTRY_IMAGE/opa@sha256:<digest>
  OPA_IMAGE: "$CI_REGISTRY_IMAGE/opa:${OPA_VERSION}"

  GITLEAKS_VERSION: "8.21.2"
  CHECKOV_VERSION: "3.2.502"
  TRIVY_VERSION: "0.69.1"
  OPA_VERSION: "1.13.1"
  JSONSCHEMA_VERSION: "4.25.1"

  SCAN_TARGET: "infra"
  CHECKOV_SKIP_PATHS: "infra/azure/dev/tests,infra/azure/test/tests,tests/fixtures"
  TRIVY_TARGET: "infra"
  TRIVY_SCAN_TYPE: "fs"
  TRIVY_SKIP_DIRS: "infra/azure/dev/tests,infra/azure/test/tests,tests/fixtures"

  CRITICAL_MAX: "0"
  HIGH_MAX: "2"
  RETRY_GUARD_MAX_RETRIES: "3"
  RETRY_GUARD_MIN_INTERVAL_SEC: "120"
  APPSEC_ALLOWED_USERS: "appsec-bot,appsec-admin,security-admin,drghassen"

stages:
  - guard
  - prepare
  - scan
  - normalize
  - contract
  - decide
  - report
  # - deploy

.default_tools: &default_tools
  image: ${SECURITY_TOOLS_IMAGE}
  before_script: []
  cache:
    key: "cloudsentinel-tools"
    policy: pull-push
    paths:
      - .trivy-cache

retry-guard:
  <<: *default_tools
  stage: guard
  script:
    - chmod +x shift-left/ci/retry-guard.sh
    - bash shift-left/ci/retry-guard.sh
  allow_failure: false

exceptions-immutability:
  <<: *default_tools
  stage: guard
  script:
    - chmod +x shift-left/ci/enforce-exceptions-immutability.sh
    - bash shift-left/ci/enforce-exceptions-immutability.sh
  allow_failure: false

build-scan-tools-image:
  stage: prepare
  timeout: 2h
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - >
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}'
      "$CI_REGISTRY" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/ci/images/scan-tools/Dockerfile"
      --destination "${SECURITY_TOOLS_IMAGE}"
      --build-arg "GITLEAKS_VERSION=${GITLEAKS_VERSION}"
      --build-arg "CHECKOV_VERSION=${CHECKOV_VERSION}"
      --build-arg "TRIVY_VERSION=${TRIVY_VERSION}"
      --build-arg "JSONSCHEMA_VERSION=${JSONSCHEMA_VERSION}"
      --snapshot-mode=redo
      --cache=true
      --cache-repo "${CI_REGISTRY_IMAGE}/cache/scan-tools"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
    - when: never

gitleaks-scan:
  <<: *default_tools
  stage: scan
  script:
    - gitleaks version
    - mkdir -p .cloudsentinel
    - export USE_BASELINE="false"
    - chmod +x shift-left/gitleaks/run-gitleaks.sh
    - bash shift-left/gitleaks/run-gitleaks.sh || true
    - chmod a+r .cloudsentinel/gitleaks_raw.json .cloudsentinel/gitleaks_opa.json 2>/dev/null || true
    - jq -r '"[scan-summary] gitleaks=" + ((.stats.TOTAL // 0) | tostring) + " has_findings=" + ((.has_findings // false) | tostring) + " state=" + (if (.status // "") == "NOT_RUN" then "NOT_RUN" else "OK" end)' .cloudsentinel/gitleaks_opa.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/gitleaks_raw.json
      - .cloudsentinel/gitleaks_opa.json

checkov-scan:
  <<: *default_tools
  stage: scan
  script:
    - checkov --version
    - mkdir -p .cloudsentinel
    - chmod +x shift-left/checkov/run-checkov.sh
    - bash shift-left/checkov/run-checkov.sh "${SCAN_TARGET}" || true
    - chmod a+r .cloudsentinel/checkov_raw.json .cloudsentinel/checkov_opa.json .cloudsentinel/checkov_scan.log 2>/dev/null || true
    - jq -r '"[scan-summary] checkov=" + ((.stats.TOTAL // 0) | tostring) + " has_findings=" + ((.has_findings // false) | tostring) + " state=" + (if (.status // "") == "NOT_RUN" then "NOT_RUN" else "OK" end)' .cloudsentinel/checkov_opa.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/checkov_raw.json
      - .cloudsentinel/checkov_opa.json
      - .cloudsentinel/checkov_scan.log

trivy-scan:
  <<: *default_tools
  stage: scan
  script:
    - trivy --version
    - mkdir -p shift-left/trivy/reports/raw .cloudsentinel
    - chmod +x shift-left/trivy/scripts/run-trivy.sh
    - bash shift-left/trivy/scripts/run-trivy.sh "${TRIVY_TARGET}" "${TRIVY_SCAN_TYPE}" || true
    - chmod -R a+r shift-left/trivy/reports/raw .cloudsentinel/trivy_opa.json 2>/dev/null || true
    - jq -r '"[scan-summary] trivy=" + ((.stats.TOTAL // 0) | tostring) + " has_findings=" + ((.has_findings // false) | tostring)' .cloudsentinel/trivy_opa.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/
      - shift-left/trivy/reports/sbom/
      - .cloudsentinel/trivy_opa.json

normalize-reports:
  <<: *default_tools
  stage: normalize
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-scan
      artifacts: true
  script:
    - chmod +x shift-left/normalizer/normalize.py
    - export ENVIRONMENT="${CI_ENVIRONMENT_NAME:-dev}"
    - export CLOUDSENTINEL_EXECUTION_MODE="ci"
    - export CLOUDSENTINEL_SCHEMA_STRICT="true"
    # Backward compatibility: allow either DOJO_* or DEFECTDOJO_* CI variable names.
    - export DOJO_URL="${DOJO_URL:-${DEFECTDOJO_URL:-}}"
    - export DOJO_API_KEY="${DOJO_API_KEY:-${DEFECTDOJO_API_KEY:-${DEFECTDOJO_API_TOKEN:-}}}"
    - python3 shift-left/normalizer/normalize.py
    - jq '.summary' .cloudsentinel/golden_report.json
    - jq '.quality_gate' .cloudsentinel/golden_report.json
    - python3 shift-left/opa/fetch-exceptions.py
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/golden_report.json
      - .cloudsentinel/gitleaks_opa.json
      - .cloudsentinel/checkov_opa.json
      - .cloudsentinel/trivy_opa.json
      - .cloudsentinel/exceptions.json
      - .cloudsentinel/dropped_exceptions.json
      - .cloudsentinel/audit_events.jsonl

contract-test:
  <<: *default_tools
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - test -f .cloudsentinel/gitleaks_opa.json
    - test -f .cloudsentinel/checkov_opa.json
    - test -f .cloudsentinel/trivy_opa.json
    - test -f .cloudsentinel/golden_report.json
    - test -f .cloudsentinel/exceptions.json
    - |
      printf '%s\n' \
        'import json, sys' \
        'from jsonschema import validate, Draft7Validator' \
        'doc    = json.load(open(".cloudsentinel/golden_report.json"))' \
        'schema = json.load(open("shift-left/normalizer/schema/cloudsentinel_report.schema.json"))' \
        'Draft7Validator.check_schema(schema)' \
        'validate(doc, schema)' \
        'print("[contract] schema validation passed")' \
        > /tmp/contract_validate.py
      python3 /tmp/contract_validate.py
    - |
      printf '%s\n' \
        'import json, sys' \
        'from jsonschema import validate, Draft7Validator' \
        'doc    = json.load(open(".cloudsentinel/exceptions.json"))' \
        'schema = json.load(open("shift-left/opa/schema/exceptions_v2.schema.json"))' \
        'Draft7Validator.check_schema(schema)' \
        'validate(doc, schema)' \
        'print("[contract] exceptions schema validation passed")' \
        > /tmp/contract_validate_exceptions.py
      python3 /tmp/contract_validate_exceptions.py
    - python3 -m unittest shift-left/opa/tests/test_fetch_exceptions.py
    - python3 -m unittest shift-left/normalizer/tests/test_normalize.py
    - bash shift-left/checkov/tests/smoke.sh
    - bash shift-left/gitleaks/tests/smoke.sh
    - bash shift-left/normalizer/tests/smoke.sh

opa-image-smoke:
  image:
    name: "$OPA_IMAGE"
    entrypoint: [""]
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - mkdir -p .cloudsentinel
    - opa version
    - bash --version | head -n1
    - curl --version | head -n1
    - jq --version
    - git --version
    - |
      opa run --server --addr=127.0.0.1:8181 \
        --log-level=error \
        --set=decision_logs.console=true \
        policies/opa/pipeline_decision.rego \
        .cloudsentinel/exceptions.json \
        > .cloudsentinel/opa-image-smoke.log 2>&1 &
    - |
      for i in {1..10}; do
        if curl -sf "http://127.0.0.1:8181/health"; then
          echo "[smoke] OPA server is UP"; break;
        fi
        echo "[smoke] Waiting for OPA... ($i/10)"
        sleep 2
      done
    - curl -sf "http://127.0.0.1:8181/v1/policies" >/dev/null
  artifacts:
    when: on_failure
    expire_in: 7 days
    paths:
      - .cloudsentinel/opa-image-smoke.log

opa-decision:
  image:
    name: "$OPA_IMAGE"
    entrypoint: [""]
  stage: decide
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - opa test policies/opa -v
    - |
      opa run --server --addr=127.0.0.1:8181 \
        --log-level=info \
        --log-format=json \
        --set=decision_logs.console=true \
        policies/opa/pipeline_decision.rego \
        .cloudsentinel/exceptions.json \
        > /tmp/opa-server.log 2>&1 &
    - sleep 1
    - curl -sf "http://127.0.0.1:8181/health" >/dev/null
    - OPA_SERVER_URL="http://127.0.0.1:8181" bash shift-left/opa/run-opa.sh --enforce
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/opa_decision.json
      - .cloudsentinel/decision_audit_events.jsonl
      - .cloudsentinel/audit_events.jsonl

upload-to-defectdojo:
  stage: report
  image: ${CURL_IMAGE_DIGEST}
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-scan
      artifacts: true
  script:
    - |
      DOJO_URL_EFF="${DOJO_URL:-${DEFECTDOJO_URL:-}}"
      DOJO_API_KEY_EFF="${DOJO_API_KEY:-${DEFECTDOJO_API_KEY:-${DEFECTDOJO_API_TOKEN:-}}}"
      DOJO_ENGAGEMENT_ID_EFF="${DOJO_ENGAGEMENT_ID:-${DEFECTDOJO_ENGAGEMENT_ID:-}}"

      if [ -z "${DOJO_URL_EFF}" ] || [ -z "${DOJO_API_KEY_EFF}" ] || [ -z "${DOJO_ENGAGEMENT_ID_EFF}" ]; then
        echo "[dojo] Missing Dojo vars. Accepted names:"
        echo "[dojo] URL: DOJO_URL or DEFECTDOJO_URL"
        echo "[dojo] API key: DOJO_API_KEY or DEFECTDOJO_API_KEY or DEFECTDOJO_API_TOKEN"
        echo "[dojo] Engagement: DOJO_ENGAGEMENT_ID or DEFECTDOJO_ENGAGEMENT_ID"
        echo "[dojo] Skipping upload."
        exit 0
      fi

      # Some scanners create artifacts with 600 permissions. Ensure readability for this job user.
      chmod -R a+r .cloudsentinel shift-left/trivy/reports/raw 2>/dev/null || true

      upload_scan() {
        local file_path="$1"
        local scan_type="$2"
        local label="$3"

        if [ ! -f "${file_path}" ]; then
          echo "[dojo] ${label}: report not found (${file_path}), skipping."
          return 0
        fi

        if [ ! -r "${file_path}" ]; then
          echo "[dojo] ${label}: report exists but is not readable (${file_path})."
          ls -l "${file_path}" || true
          return 0
        fi

        if curl -sS -X POST "${DOJO_URL_EFF}/api/v2/import-scan/" \
          -H "Authorization: Token ${DOJO_API_KEY_EFF}" \
          -F "file=@${file_path}" \
          -F "scan_type=${scan_type}" \
          --form-string "engagement=${DOJO_ENGAGEMENT_ID_EFF}" \
          --form-string "active=true" \
          --form-string "verified=false" \
          --form-string "close_old_findings=true" \
          --form-string "close_old_findings_product_scope=false" \
          --form-string "deduplication_on_engagement=true" \
          >/dev/null; then
          echo "[dojo] ${label} uploaded"
        else
          echo "[dojo] ${label} upload failed (curl exit $?)"
          ls -l "${file_path}" || true
          return 1
        fi
      }

      upload_scan ".cloudsentinel/gitleaks_raw.json" "Gitleaks Scan" "Gitleaks"
      upload_scan ".cloudsentinel/checkov_raw.json" "Checkov Scan" "Checkov"
      upload_scan "shift-left/trivy/reports/raw/trivy-fs-raw.json" "Trivy Scan" "Trivy (FS/SCA)"
  when: always
  allow_failure: true


# workflow: controls which pipelines are created.
# Only MR events, main, and develop branches trigger the pipeline.
# Remove or restrict this block if you need manual triggers.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

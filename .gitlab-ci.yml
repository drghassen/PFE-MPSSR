# ============================================================================
# CloudSentinel - GitLab CI/CD
# Shift-Left scanners are advisory only. OPA is the single ALLOW/DENY gate.
# ============================================================================
#teste
default:
  tags:
    - cloudsentinel
    - docker

variables:
  # Base images pinned by tag; override with digests via *_IMAGE_DIGEST in CI settings.
  PYTHON_IMAGE_DIGEST: "python:3.11-bookworm"
  CURL_IMAGE_DIGEST: "curlimages/curl:8.12.1"
  # Recommended: override with immutable digest in CI/CD settings.
  # Example: $CI_REGISTRY_IMAGE/opa@sha256:<digest>
  OPA_IMAGE: "$CI_REGISTRY_IMAGE/opa:${OPA_VERSION}"

  GITLEAKS_VERSION: "8.21.2"
  CHECKOV_VERSION: "3.2.502"
  TRIVY_VERSION: "0.69.1"
  OPA_VERSION: "1.13.1"
  JSONSCHEMA_VERSION: "4.25.1"

  CACHE_DIR: "$CI_PROJECT_DIR/.cache"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

  # Supply chain pin for Checkov wheel (3.2.502). Override from CI/CD settings if needed.
  CHECKOV_WHEEL_SHA256: "277aa51545c2b8ac4ffd747aa6d15bda75bed4ab0984ed1757d2c60abfdd343c"

  SCAN_TARGET: "infra/azure/dev"
  TRIVY_TARGET: "infra/azure/dev"
  TRIVY_SCAN_TYPE: "config"

  CRITICAL_MAX: "0"
  HIGH_MAX: "2"

stages:
  - scan
  - normalize
  - contract
  - decide
  - report
  - deploy

.default_tools: &default_tools
  image: ${PYTHON_IMAGE_DIGEST}
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash ca-certificates curl git jq tar gzip
    - rm -rf /var/lib/apt/lists/*
  cache:
    key: "cloudsentinel-tools"
    policy: pull-push
    paths:
      - .cache/pip
      - .cache/gitleaks
      - .cache/trivy

gitleaks-scan:
  <<: *default_tools
  stage: scan
  script:
    - mkdir -p "${CACHE_DIR}/gitleaks" .cloudsentinel
    - export USE_BASELINE="false"
    - GITLEAKS_TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
    - GITLEAKS_CHECKSUMS="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
    - |
      if [ ! -f "${CACHE_DIR}/gitleaks/${GITLEAKS_TARBALL}" ]; then
        curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_TARBALL}" \
          -o "${CACHE_DIR}/gitleaks/${GITLEAKS_TARBALL}"
      fi
    - |
      if [ ! -f "${CACHE_DIR}/gitleaks/${GITLEAKS_CHECKSUMS}" ]; then
        curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_CHECKSUMS}" \
          -o "${CACHE_DIR}/gitleaks/${GITLEAKS_CHECKSUMS}"
      fi
    - |
      cd "${CACHE_DIR}/gitleaks"
      grep " ${GITLEAKS_TARBALL}$" "${GITLEAKS_CHECKSUMS}" | sha256sum -c -
      cd -
    - tar -xzf "${CACHE_DIR}/gitleaks/${GITLEAKS_TARBALL}" -C /usr/local/bin gitleaks
    - chmod +x shift-left/gitleaks/run-gitleaks.sh
    - bash shift-left/gitleaks/run-gitleaks.sh || true
    - jq -r '"[scan-summary] gitleaks=" + ((.stats.TOTAL // 0) | tostring) + " has_findings=" + ((.has_findings // false) | tostring) + " state=" + (if (.status // "") == "NOT_RUN" then "NOT_RUN" else "OK" end)' .cloudsentinel/gitleaks_opa.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/gitleaks_raw.json
      - .cloudsentinel/gitleaks_opa.json

checkov-scan:
  <<: *default_tools
  stage: scan
  script:
    - mkdir -p .cloudsentinel
    - |
      if [ -z "${CHECKOV_WHEEL_SHA256}" ]; then
        echo "[checkov] Missing CHECKOV_WHEEL_SHA256 env var (set it in CI/CD settings)"; exit 1; fi
    - CHECKOV_WHEEL_FILE="checkov-${CHECKOV_VERSION}-py3-none-any.whl"
    - CHECKOV_WHEEL_URL="https://files.pythonhosted.org/packages/py3/c/checkov/${CHECKOV_WHEEL_FILE}"
    - curl -sSL "${CHECKOV_WHEEL_URL}" -o "/tmp/${CHECKOV_WHEEL_FILE}"
    - echo "${CHECKOV_WHEEL_SHA256}  /tmp/${CHECKOV_WHEEL_FILE}" | sha256sum -c -
    - pip install --disable-pip-version-check --no-deps --no-cache-dir "/tmp/${CHECKOV_WHEEL_FILE}"
    - chmod +x shift-left/checkov/run-checkov.sh
    - bash shift-left/checkov/run-checkov.sh "${SCAN_TARGET}" || true
    - jq -r '"[scan-summary] checkov=" + ((.stats.TOTAL // 0) | tostring) + " has_findings=" + ((.has_findings // false) | tostring) + " state=" + (if (.status // "") == "NOT_RUN" then "NOT_RUN" else "OK" end)' .cloudsentinel/checkov_opa.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/checkov_raw.json
      - .cloudsentinel/checkov_opa.json
      - .cloudsentinel/checkov_scan.log

trivy-scan:
  <<: *default_tools
  stage: scan
  script:
    - mkdir -p "${CACHE_DIR}/trivy" shift-left/trivy/reports/raw .cloudsentinel
    - TRIVY_TARBALL="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
    - TRIVY_CHECKSUMS="trivy_${TRIVY_VERSION}_checksums.txt"
    - |
      if [ ! -f "${CACHE_DIR}/trivy/${TRIVY_TARBALL}" ]; then
        curl -sSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${TRIVY_TARBALL}" \
          -o "${CACHE_DIR}/trivy/${TRIVY_TARBALL}"
      fi
    - |
      if [ ! -f "${CACHE_DIR}/trivy/${TRIVY_CHECKSUMS}" ]; then
        curl -sSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${TRIVY_CHECKSUMS}" \
          -o "${CACHE_DIR}/trivy/${TRIVY_CHECKSUMS}"
      fi
    - |
      cd "${CACHE_DIR}/trivy"
      grep " ${TRIVY_TARBALL}$" "${TRIVY_CHECKSUMS}" | sha256sum -c -
      cd -
    - tar -xzf "${CACHE_DIR}/trivy/${TRIVY_TARBALL}" -C /usr/local/bin trivy
    - chmod +x shift-left/trivy/scripts/run-trivy.sh
    - bash shift-left/trivy/scripts/run-trivy.sh "${TRIVY_TARGET}" "${TRIVY_SCAN_TYPE}" || true
    - jq -r '"[scan-summary] trivy=" + ((.stats.TOTAL // 0) | tostring) + " has_findings=" + ((.has_findings // false) | tostring)' .cloudsentinel/trivy_opa.json
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/
      - .cloudsentinel/trivy_opa.json

normalize-reports:
  <<: *default_tools
  stage: normalize
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-scan
      artifacts: true
  script:
    - pip install --no-cache-dir "jsonschema==${JSONSCHEMA_VERSION}"
    - chmod +x shift-left/normalizer/normalize.sh
    - export ENVIRONMENT="${CI_ENVIRONMENT_NAME:-dev}"
    - export CLOUDSENTINEL_EXECUTION_MODE="ci"
    - export CLOUDSENTINEL_SCHEMA_STRICT="true"
    - bash shift-left/normalizer/normalize.sh
    - jq '.summary' .cloudsentinel/golden_report.json
    - jq '.quality_gate' .cloudsentinel/golden_report.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/golden_report.json
      - .cloudsentinel/gitleaks_opa.json
      - .cloudsentinel/checkov_opa.json
      - .cloudsentinel/trivy_opa.json

contract-test:
  <<: *default_tools
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - pip install --no-cache-dir "jsonschema==${JSONSCHEMA_VERSION}"
    - test -f .cloudsentinel/gitleaks_opa.json
    - test -f .cloudsentinel/checkov_opa.json
    - test -f .cloudsentinel/trivy_opa.json
    - test -f .cloudsentinel/golden_report.json
    - |
      printf '%s\n' \
        'import json, sys' \
        'from jsonschema import validate, Draft7Validator' \
        'doc    = json.load(open(".cloudsentinel/golden_report.json"))' \
        'schema = json.load(open("shift-left/normalizer/schema/cloudsentinel_report.schema.json"))' \
        'Draft7Validator.check_schema(schema)' \
        'validate(doc, schema)' \
        'print("[contract] schema validation passed")' \
        > /tmp/contract_validate.py
      python3 /tmp/contract_validate.py

opa-image-smoke:
  image: "$OPA_IMAGE"
  stage: contract
  script:
    - mkdir -p .cloudsentinel
    - opa version
    - bash --version | head -n1
    - curl --version | head -n1
    - jq --version
    - git --version
    - |
      opa run --server --addr=127.0.0.1:8181 \
        --log-level=error \
        --set=decision_logs.console=true \
        policies/opa/pipeline_decision.rego \
        policies/opa/exceptions.json \
        > .cloudsentinel/opa-image-smoke.log 2>&1 &
    - sleep 1
    - curl -sf "http://127.0.0.1:8181/health" >/dev/null
    - curl -sf "http://127.0.0.1:8181/v1/policies" >/dev/null
  artifacts:
    when: on_failure
    expire_in: 7 days
    paths:
      - .cloudsentinel/opa-image-smoke.log

opa-decision:
  image: "$OPA_IMAGE"
  stage: decide
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - opa test policies/opa -v
    - |
      opa run --server --addr=127.0.0.1:8181 \
        --log-level=info \
        --log-format=json \
        --set=decision_logs.console=true \
        policies/opa/pipeline_decision.rego \
        policies/opa/exceptions.json \
        > /tmp/opa-server.log 2>&1 &
    - sleep 1
    - curl -sf "http://127.0.0.1:8181/health" >/dev/null
    - OPA_SERVER_URL="http://127.0.0.1:8181" bash shift-left/opa/run-opa.sh --enforce
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/opa_decision.json

upload-to-defectdojo:
  stage: report
  image: ${CURL_IMAGE_DIGEST}
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-scan
      artifacts: true
  script:
    - |
      if [ -z "${DOJO_URL:-}" ] || [ -z "${DOJO_API_KEY:-}" ] || [ -z "${DOJO_ENGAGEMENT_ID:-}" ]; then
        echo "[dojo] Missing DOJO_URL / DOJO_API_KEY / DOJO_ENGAGEMENT_ID. Skipping upload."
        exit 0
      fi

      if [ -f ".cloudsentinel/gitleaks_raw.json" ]; then
        curl -sS -X POST "${DOJO_URL}/api/v2/import-scan/" \
          -H "Authorization: Token ${DOJO_API_KEY}" \
          -F "file=@.cloudsentinel/gitleaks_raw.json" \
          -F "scan_type=Gitleaks Scan" \
          -F "engagement=${DOJO_ENGAGEMENT_ID}" \
          -F "active=true" -F "verified=false" >/dev/null
        echo "[dojo] Gitleaks uploaded"
      fi

      if [ -f ".cloudsentinel/checkov_raw.json" ]; then
        curl -sS -X POST "${DOJO_URL}/api/v2/import-scan/" \
          -H "Authorization: Token ${DOJO_API_KEY}" \
          -F "file=@.cloudsentinel/checkov_raw.json" \
          -F "scan_type=Checkov Scan" \
          -F "engagement=${DOJO_ENGAGEMENT_ID}" \
          -F "active=true" -F "verified=false" >/dev/null
        echo "[dojo] Checkov uploaded"
      fi

      if [ -f "shift-left/trivy/reports/raw/trivy-config-raw.json" ]; then
        curl -sS -X POST "${DOJO_URL}/api/v2/import-scan/" \
          -H "Authorization: Token ${DOJO_API_KEY}" \
          -F "file=@shift-left/trivy/reports/raw/trivy-config-raw.json" \
          -F "scan_type=Trivy Scan" \
          -F "engagement=${DOJO_ENGAGEMENT_ID}" \
          -F "active=true" -F "verified=false" >/dev/null
        echo "[dojo] Trivy uploaded"
      fi
  when: always
  allow_failure: true

deploy-infrastructure:
  stage: deploy
  <<: *default_tools
  needs:
    - job: opa-decision
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends gpg
    - rm -rf /var/lib/apt/lists/*
    - curl --proto '=https' --tlsv1.2 -fsSL https://get.opentofu.org/install-opentofu.sh -o /tmp/install-opentofu.sh
    - chmod +x /tmp/install-opentofu.sh
    - /tmp/install-opentofu.sh --install-method standalone --install-path /usr/local/bin
    - tofu version
    - cd infra/azure/dev
  script:
    - tofu init
    - tofu plan -out=tfplan
    - tofu apply -auto-approve tfplan
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# workflow: controls which pipelines are created.
# Only MR events, main, and develop branches trigger the pipeline.
# Remove or restrict this block if you need manual triggers.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ============================================================================
# CloudSentinel - GitLab CI/CD
# Shift-Left scanners are advisory only. OPA is the single ALLOW/DENY gate.
# ============================================================================

default:
  tags:
    - cloudsentinel
    - docker

variables:
  SCAN_TOOLS_IMAGE: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:f2f6762e13c9517cc6c06cb1f632bed665761df7756c9b1ff6cc4204bee68cce"
  TOFU_VERSION: "1.8.8"
  TOFU_LINUX_AMD64_ZIP_SHA256: "9e889633bc177b1d266552658020fe8ceb839445fcac82aaa7622952fd9c81bb"
  GITLEAKS_VERSION: "8.21.2"
  CHECKOV_VERSION: "3.2.502"
  TRIVY_VERSION: "0.69.1"
  OPA_VERSION: "1.13.1"
  JSONSCHEMA_VERSION: "4.25.1"

  SCAN_TARGET: "infra/azure/student-secure"
  CHECKOV_SKIP_PATHS: "infra/azure/student-secure/tests,infra/azure/test/tests,tests/fixtures"
  TRIVY_TARGET: "infra/azure/student-secure"
  TRIVY_IMAGE_TARGET: "alpine:3.21"
  TRIVY_SKIP_DIRS: "infra/azure/student-secure/tests,infra/azure/test/tests,tests/fixtures"

  CRITICAL_MAX: "0"
  HIGH_MAX: "2"
  RETRY_GUARD_MAX_RETRIES: "3"
  RETRY_GUARD_MIN_INTERVAL_SEC: "120"
  APPSEC_ALLOWED_USERS: "appsec-bot,appsec-admin"

stages:
  - guard
  - prepare
  - scan
  - normalize
  - contract
  - decide
  - report
  - deploy

.default_tools: &default_tools
  image: "${SCAN_TOOLS_IMAGE}"
  before_script: []

.trivy_cache_pull: &trivy_cache_pull
  cache:
    key: "trivy-db-${CI_PROJECT_ID}-${TRIVY_VERSION}"
    policy: pull
    paths:
      - .trivy-cache

.trivy_cache_pull_push: &trivy_cache_pull_push
  cache:
    key: "trivy-db-${CI_PROJECT_ID}-${TRIVY_VERSION}"
    policy: pull-push
    paths:
      - .trivy-cache

retry-guard:
  <<: *default_tools
  stage: guard
  script:
    - chmod +x ci/scripts/retry-guard.sh
    - bash ci/scripts/retry-guard.sh
  allow_failure: false

policies-immutability:
  <<: *default_tools
  stage: guard
  script:
    - chmod +x ci/scripts/policies-immutability.sh
    - bash ci/scripts/policies-immutability.sh
  allow_failure: false


build-scan-tools-image:
  stage: prepare
  timeout: 2h
  image:
    name: "gcr.io/kaniko-project/executor@sha256:c3109d5926a997b100c4343944e06c6b30a6804b2f9abe0994d3de6ef92b028e"
    entrypoint: [""]
  script:
    - chmod +x ci/scripts/build-scan-tools-image.sh
    - /busybox/sh ci/scripts/build-scan-tools-image.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
    - when: never

build-deploy-tools-image:
  stage: deploy
  timeout: 2h
  image:
    name: "gcr.io/kaniko-project/executor@sha256:c3109d5926a997b100c4343944e06c6b30a6804b2f9abe0994d3de6ef92b028e"
    entrypoint: [""]
  script:
    - chmod +x ci/scripts/build-deploy-tools-image.sh
    - /busybox/sh ci/scripts/build-deploy-tools-image.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(main|develop)$/'

gitleaks-scan:
  <<: *default_tools
  stage: scan
  needs: []
  script:
    - chmod +x ci/scripts/gitleaks-scan.sh
    - bash ci/scripts/gitleaks-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/gitleaks_raw.json
      - .cloudsentinel/gitleaks_opa.json

checkov-scan:
  <<: *default_tools
  stage: scan
  needs: []
  script:
    - chmod +x ci/scripts/checkov-scan.sh
    - bash ci/scripts/checkov-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/checkov_raw.json
      - .cloudsentinel/checkov_opa.json
      - .cloudsentinel/checkov_scan.log

trivy-fs-scan:
  <<: [*default_tools, *trivy_cache_pull_push]
  stage: scan
  needs: []
  script:
    - chmod +x ci/scripts/trivy-fs-scan.sh
    - bash ci/scripts/trivy-fs-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/trivy-fs-raw.json
      - shift-left/trivy/reports/sbom/trivy-fs.cdx.json
      - .cloudsentinel/trivy_fs_opa.json

trivy-config-scan:
  <<: [*default_tools, *trivy_cache_pull]
  stage: scan
  needs: []
  script:
    - chmod +x ci/scripts/trivy-config-scan.sh
    - bash ci/scripts/trivy-config-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/trivy-config-raw.json
      - .cloudsentinel/trivy_config_opa.json

trivy-image-scan:
  <<: [*default_tools, *trivy_cache_pull]
  stage: scan
  needs: []
  script:
    - chmod +x ci/scripts/trivy-image-scan.sh
    - bash ci/scripts/trivy-image-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/trivy-image-raw.json
      - shift-left/trivy/reports/sbom/trivy-image.cdx.json
      - .cloudsentinel/trivy_image_opa.json

normalize-reports:
  <<: *default_tools
  stage: normalize
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-fs-scan
      artifacts: true
    - job: trivy-config-scan
      artifacts: true
    - job: trivy-image-scan
      artifacts: true
  script:
    - chmod +x ci/scripts/normalize-reports.sh
    - bash ci/scripts/normalize-reports.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/golden_report.json
      - .cloudsentinel/gitleaks_opa.json
      - .cloudsentinel/checkov_opa.json
      - .cloudsentinel/trivy_opa.json
      - .cloudsentinel/trivy_fs_opa.json
      - .cloudsentinel/trivy_config_opa.json
      - .cloudsentinel/trivy_image_opa.json
      - .cloudsentinel/exceptions.json
      - .cloudsentinel/dropped_exceptions.json
      - .cloudsentinel/audit_events.jsonl

contract-test:
  <<: *default_tools
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - chmod +x ci/scripts/contract-test.sh
    - bash ci/scripts/contract-test.sh
opa-image-smoke:
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:740ebf73adc25cd85b2a08615666b4e728812c0cc487760c6953ffe675ca78cd"
    entrypoint: [""]
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - chmod +x ci/scripts/opa-image-smoke.sh
    - bash ci/scripts/opa-image-smoke.sh
  artifacts:
    when: on_failure
    expire_in: 7 days
    paths:
      - .cloudsentinel/opa-image-smoke.log

opa-decision:
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:740ebf73adc25cd85b2a08615666b4e728812c0cc487760c6953ffe675ca78cd"
    entrypoint: [""]
  stage: decide
  needs:
    - job: normalize-reports
      artifacts: true
    - job: contract-test
    - job: opa-image-smoke
  script:
    - chmod +x ci/scripts/opa-decision.sh
    - bash ci/scripts/opa-decision.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/opa_decision.json
      - .cloudsentinel/decision_audit_events.jsonl
      - .cloudsentinel/audit_events.jsonl

upload-to-defectdojo:
  stage: report
  image: "curlimages/curl@sha256:d9b4541e214bcd85196d6e92e2753ac6d0ea699f0af5741f8c6cccbfcf00ef4b"
  retry: 2
  variables:
    GIT_STRATEGY: none
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-fs-scan
      artifacts: true
  script:
    - chmod +x ci/scripts/upload-to-defectdojo.sh
    - sh ci/scripts/upload-to-defectdojo.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/dojo-responses/
  when: always
  allow_failure: false

deploy-infrastructure:
  image: "${CI_REGISTRY_IMAGE}/deploy-tools:${CI_COMMIT_SHA}"
  before_script: []
  stage: deploy
  needs:
    - job: build-deploy-tools-image
    - job: opa-decision
      artifacts: true
  script:
    - chmod +x ci/scripts/deploy-infrastructure.sh
    - bash ci/scripts/deploy-infrastructure.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/terraform_outputs_student_secure.json
      - infra/azure/student-secure/tfplan
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(main|develop)$/'

# workflow: controls which pipelines are created.
# Only MR events, main, and develop branches trigger the pipeline.
# Remove or restrict this block if you need manual triggers.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ============================================================================
# CloudSentinel - Pre-commit Hooks Configuration
# Goal: Shift-Left security starts on the developer's laptop.
# ============================================================================
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.26
    hooks:
      - id: terraform-fmt
      - id: terraform-validate
      - id: tflint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks-system

  - repo: local
    hooks:
      - id: opa-check
        name: OPA Policy Static Check
        entry: opa check
        language: system
        files: \.rego$

################################################################################
# CloudSentinel — Trivy Configuration (CI / Enforcement Mode)
# Scope: vulnerability/SCA only (OS packages + language libraries)
# IaC/config is owned by Checkov. Secret detection is owned by Gitleaks.
# NOTE: exit-code: 0 — OPA Quality Gate handles ALLOW/DENY decision
################################################################################

scan:
  scanners:
    - vuln  # CVE in OS packages + language libraries only
  # IaC misconfigs → Checkov | Container misconfigs → trivy image scan
  skip-dirs:
    - shift-left/trivy/tests

severity:
  - CRITICAL
  - HIGH
  - MEDIUM
  - LOW

# JSON output — consumed by OPA normalization pipeline
format: json

timeout: 15m

# CI-optimised cache
cache:
  dir: .trivy-cache

# Suppress DB download progress bar in CI logs
db:
  no-progress: true

# Package types to scan (replaces deprecated 'vulnerability.type')
pkg:
  types:
    - os
    - library

# OPA is the enforcement layer — Trivy always exits 0
exit-code: 0

# Always show whether a fix is available
show-suppressed: false

metadata:
  id: "CKV2_CS_AZ_011"
  name: "Ensure VM extension operations are explicitly configured (CIS 7.2)"
  category: "GENERAL_SECURITY"
  severity: "MEDIUM"
  guideline: "https://docs.microsoft.com/en-us/azure/virtual-machines/extensions/agent-windows"
  # ATTRIBUTE NOTE: azurerm_linux/windows_virtual_machine does not expose
  # provision_vm_agent (always true on these resource types). The equivalent
  # control is allow_extension_operations — requiring it to be explicitly
  # declared prevents accidental default-true exposure of the extension surface.

definition:
  cond_type: "attribute"
  resource_types:
    - "azurerm_linux_virtual_machine"
    - "azurerm_windows_virtual_machine"
  attribute: "allow_extension_operations"
  operator: "exists"

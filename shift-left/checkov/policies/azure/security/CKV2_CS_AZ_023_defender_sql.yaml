metadata:
  id: "CKV2_CS_AZ_023"
  name: "Ensure Microsoft Defender for SQL is enabled (CIS 2.2)"
  category: "GENERAL_SECURITY"
  severity: "HIGH"
  guideline: "https://docs.microsoft.com/en-us/azure/defender-for-cloud/defender-for-sql-introduction"
  # SCOPE NOTE: Targets MS SQL Server (azurerm_mssql_server_security_alert_policy).
  # student-secure IaC uses MySQL Flexible Server — no Terraform equivalent
  # for this control. Policy retained for future MS SQL deployments.

definition:
  cond_type: "attribute"
  resource_types:
    - "azurerm_mssql_server_security_alert_policy"
  attribute: "state"
  operator: "equals"
  value: "Enabled"

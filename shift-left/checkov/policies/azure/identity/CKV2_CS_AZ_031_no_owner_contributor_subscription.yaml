metadata:
  id: "CKV2_CS_AZ_031"
  name: "Ensure no Owner or Contributor role is assigned at subscription scope"
  category: "IAM"
  severity: "CRITICAL"
  guideline: "https://docs.microsoft.com/en-us/azure/role-based-access-control/best-practices"

definition:
  and:
    # Match only Owner or Contributor (substring match covers variants)
    - or:
        - cond_type: "attribute"
          resource_types:
            - "azurerm_role_assignment"
          attribute: "role_definition_name"
          operator: "contains"
          value: "Owner"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_role_assignment"
          attribute: "role_definition_name"
          operator: "contains"
          value: "Contributor"
    # Exclude legitimate roles required for CMK/DES (Key Vault data-plane operations)
    - cond_type: "attribute"
      resource_types:
        - "azurerm_role_assignment"
      attribute: "role_definition_name"
      operator: "not_contains"
      value: "Crypto"
    - cond_type: "attribute"
      resource_types:
        - "azurerm_role_assignment"
      attribute: "role_definition_name"
      operator: "not_contains"
      value: "Encryption"
    # Scope: subscription-level only (not resource-group or lower)
    - cond_type: "attribute"
      resource_types:
        - "azurerm_role_assignment"
      attribute: "scope"
      operator: "contains"
      value: "/subscriptions/"
    - cond_type: "attribute"
      resource_types:
        - "azurerm_role_assignment"
      attribute: "scope"
      operator: "not_contains"
      value: "/resourceGroups/"

metadata:
  id: "CKV2_CS_AZ_015"
  name: "Ensure Key Vault uses RBAC or explicit access policy authorization"
  category: "IAM"
  severity: "MEDIUM"
  guideline: "https://docs.microsoft.com/en-us/azure/key-vault/general/rbac-guide"

definition:
  or:
    - cond_type: "attribute"
      resource_types:
        - "azurerm_key_vault"
      attribute: "enable_rbac_authorization"
      operator: "equals"
      value: true
    - cond_type: "attribute"
      resource_types:
        - "azurerm_key_vault"
      attribute: "access_policy"
      operator: "exists"

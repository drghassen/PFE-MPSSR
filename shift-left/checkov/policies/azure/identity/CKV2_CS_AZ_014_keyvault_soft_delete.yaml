metadata:
  id: "CKV2_CS_AZ_014"
  name: "Ensure key vault has soft delete enabled (CIS 8.3)"
  category: "BACKUP_AND_RECOVERY"
  severity: "HIGH"
  guideline: "https://docs.microsoft.com/en-us/azure/key-vault/general/soft-delete-overview"

definition:
  cond_type: "attribute"
  resource_types:
    - "azurerm_key_vault"
  # AzureRM v3+ no longer exposes soft_delete_enabled.
  # soft_delete_retention_days >= 7 is an explicit and auditable soft-delete signal.
  attribute: "soft_delete_retention_days"
  operator: "greater_than_or_equal"
  value: 7

metadata:
  id: "CKV2_CS_AZ_021"
  name: "Ensure SSH access from the Internet is evaluated and restricted (CIS 6.4)"
  category: "NETWORKING"
  severity: "CRITICAL"
  guideline: "https://docs.microsoft.com/en-us/azure/virtual-network/network-security-groups-overview"

definition:
  and:
    # Trigger when port 22 is exposed (single port or range)
    - or:
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "destination_port_range"
          operator: "equals"
          value: "22"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "destination_port_ranges"
          operator: "contains"
          value: "22"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.destination_port_range"
          operator: "equals"
          value: "22"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.destination_port_ranges"
          operator: "contains"
          value: "22"

    # [F1 FIX] Cover all Azure-equivalent "any internet" source values in both:
    # - source_address_prefix      (single value)
    # - source_address_prefixes    (list form)
    # Supported internet-equivalent values:
    # "*", "0.0.0.0/0", "::/0", "Internet", "Any"
    - or:
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "source_address_prefix"
          operator: "equals"
          value: "*"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "source_address_prefix"
          operator: "equals"
          value: "0.0.0.0/0"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "source_address_prefix"
          operator: "equals"
          value: "::/0"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "source_address_prefix"
          operator: "equals"
          value: "Internet"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "source_address_prefix"
          operator: "equals"
          value: "Any"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "source_address_prefixes"
          operator: "contains"
          value: "*"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "source_address_prefixes"
          operator: "contains"
          value: "0.0.0.0/0"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "source_address_prefixes"
          operator: "contains"
          value: "::/0"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "source_address_prefixes"
          operator: "contains"
          value: "Internet"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "source_address_prefixes"
          operator: "contains"
          value: "Any"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefix"
          operator: "equals"
          value: "*"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefix"
          operator: "equals"
          value: "0.0.0.0/0"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefix"
          operator: "equals"
          value: "::/0"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefix"
          operator: "equals"
          value: "Internet"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefix"
          operator: "equals"
          value: "Any"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefixes"
          operator: "contains"
          value: "*"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefixes"
          operator: "contains"
          value: "0.0.0.0/0"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefixes"
          operator: "contains"
          value: "::/0"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefixes"
          operator: "contains"
          value: "Internet"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefixes"
          operator: "contains"
          value: "Any"

    - or:
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_rule"
          attribute: "access"
          operator: "equals"
          value: "Allow"
        - cond_type: "attribute"
          resource_types:
            - "azurerm_network_security_group"
          attribute: "security_rule.access"
          operator: "equals"
          value: "Allow"

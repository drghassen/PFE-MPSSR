metadata:
  id: "CKV2_CS_AZ_012"
  name: "Ensure Azure SQL Database TDE is enabled with Customer-Managed Key (CIS 4.2)"
  category: "ENCRYPTION"
  severity: "MEDIUM"
  guideline: "https://docs.microsoft.com/en-us/azure/azure-sql/database/transparent-data-encryption-byok-overview"
  # SCOPE NOTE: Targets MS SQL Server (azurerm_mssql_server_transparent_data_encryption).
  # student-secure IaC uses MySQL Flexible Server — no Terraform equivalent
  # for this control. Policy retained for future MS SQL deployments.

definition:
  cond_type: "attribute"
  resource_types:
    - "azurerm_mssql_server_transparent_data_encryption"
  attribute: "key_vault_key_id"
  operator: "exists"

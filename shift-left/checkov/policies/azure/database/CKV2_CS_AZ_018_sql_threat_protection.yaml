metadata:
  id: "CKV2_CS_AZ_018"
  name: "Ensure Azure SQL Database Advanced Threat Protection is enabled (CIS 4.3)"
  category: "NETWORKING"
  severity: "HIGH"
  guideline: "https://docs.microsoft.com/en-us/azure/azure-sql/database/threat-detection-overview"
  # SCOPE NOTE: Targets MS SQL Server (azurerm_mssql_server_security_alert_policy).
  # student-secure IaC uses MySQL Flexible Server — no Terraform equivalent
  # for this control. Policy retained for future MS SQL deployments.

definition:
  cond_type: "attribute"
  resource_types:
    - "azurerm_mssql_server_security_alert_policy"
  attribute: "state"
  operator: "equals"
  value: "Enabled"

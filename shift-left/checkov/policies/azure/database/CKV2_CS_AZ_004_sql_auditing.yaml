metadata:
  id: "CKV2_CS_AZ_004"
  name: "Ensure Azure SQL Database Auditing is enabled (CIS 4.1)"
  category: "LOGGING"
  severity: "HIGH"
  guideline: "https://docs.microsoft.com/en-us/azure/azure-sql/database/auditing-overview"
  # SCOPE NOTE: Targets MS SQL Server (azurerm_mssql_server_extended_auditing_policy).
  # student-secure IaC uses MySQL Flexible Server — no Terraform equivalent
  # for this control. Policy retained for future MS SQL deployments.

definition:
  cond_type: "attribute"
  resource_types:
    - "azurerm_mssql_server_extended_auditing_policy"
    - "azurerm_sql_server_extended_auditing_policy"
  attribute: "enabled"
  operator: "equals"
  value: true

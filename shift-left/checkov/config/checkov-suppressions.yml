# Scanner-scope suppressions only.
# Risk exceptions must stay visible in Checkov output and be accepted through
# DefectDojo/OPA with owner, justification, approval, and expiry.
#
# Entries below are scanner-scope decisions: checks that cannot see cross-file
# resources (Checkov module-scan limitation), known false positives where the
# code already satisfies the requirement, or dev-env accepted risks that would
# be full DefectDojo exceptions in production.
#
# ─────────────────────────────────────────────────────────────────────────────
# KEY VAULT — network / private endpoint
# ─────────────────────────────────────────────────────────────────────────────
# CKV_AZURE_189  public_network_access_enabled evaluated on azurerm_key_vault.
#   The network_acls block (default_action=Deny, bypass=AzureServices) already
#   blocks all traffic not coming from AzureServices or the allowed_subnet_ids
#   list. Full private-endpoint provisioning is done at the environment layer
#   (envs/dev/main.tf) which Checkov cannot see in a module-scoped scan.
#
# CKV2_AZURE_32  Checks for azurerm_private_endpoint linked to Key Vault.
#   The private endpoint is provisioned at environment level, not inside the
#   reusable module. The DNS zone + VNet link inside the module are evidence
#   of the intended private-connectivity architecture.
skip-check:
  - CKV_AZURE_189
  - CKV2_AZURE_32

  # ─────────────────────────────────────────────────────────────────────────
  # STORAGE — public access / CMK / replication / logging
  # ─────────────────────────────────────────────────────────────────────────
  # CKV_AZURE_59   public_network_access_enabled on azurerm_storage_account.
  #   Access is restricted by azurerm_storage_account_network_rules
  #   (default_action=Deny, bypass=AzureServices, VNet subnet allow-list).
  #
  # CKV2_AZURE_33  Customer-Managed Key (CMK) double encryption.
  #   infrastructure_encryption_enabled=true is already set (platform-level
  #   double encryption). CMK key-rotation overhead is deferred to production.
  #
  # CKV2_AZURE_40  shared_access_key_enabled=false.
  #   SAS keys are required for dev tooling (VM boot diagnostics storage URI,
  #   Terraform state operations). default_to_oauth_authentication=true is
  #   set; SAS expiry is enforced at 1 h via sas_policy.
  #
  # CKV2_AZURE_1   CMK-backed SAS policy (resource_type check).
  #   The sas_policy block is configured (expiration 1 h, action Log).
  #   CMK-backed SAS requires Key Vault integration; deferred to production.
  #
  # CKV_AZURE_33   Storage queue logging evaluated via account_kind attribute.
  #   Queue logging IS enabled via the companion azurerm_storage_account_queue_properties
  #   resource (read/write/delete=true, retention=10 days). Checkov evaluates
  #   only the storage account block and cannot correlate the separate resource.
  #
  # CKV2_AZURE_21  Blob container public access / blob-level audit logging.
  #   All containers use container_access_type=private. Blob audit logging
  #   via diagnostic settings is a subscription-wide concern.
  #
  # CKV_AZURE_206  account_replication_type cross-region redundancy.
  #   LRS is intentional in dev (cost optimisation). GRS required in prod.
  #
  # CKV_AZURE_43   Activity log retention >= 365 days.
  #   Activity log retention is an Azure Monitor subscription-level setting,
  #   not a storage account attribute; not applicable at the module level.
  - CKV_AZURE_59
  - CKV2_AZURE_33
  - CKV2_AZURE_40
  - CKV2_AZURE_1
  - CKV_AZURE_33
  - CKV2_AZURE_21
  - CKV_AZURE_206
  - CKV_AZURE_43

  # ─────────────────────────────────────────────────────────────────────────
  # COSMOSDB — network / CMK / local auth
  # ─────────────────────────────────────────────────────────────────────────
  # CKV_AZURE_101  public_network_access_enabled on azurerm_cosmosdb_account.
  #   is_virtual_network_filter_enabled=true with an explicit
  #   virtual_network_rule allow-list restricts access to authorised subnets.
  #
  # CKV_AZURE_100  Customer-Managed Key (CMK) on Cosmos DB.
  #   Cosmos DB encrypts data at rest with Microsoft-managed keys by default.
  #   CMK adds key-rotation overhead not warranted in dev.
  #
  # CKV_AZURE_132  local_authentication_disabled check.
  #   FALSE POSITIVE — local_authentication_disabled=true is already set in
  #   the resource. Checkov misreads the attribute when the resource uses
  #   count = var.enabled ? 1 : 0 (conditional provisioning pattern).
  #
  # CKV2_CS_AZ_039  Custom check: public_network_access_enabled=false on Cosmos DB.
  #   is_virtual_network_filter_enabled=true with an explicit virtual_network_rule
  #   allow-list already restricts access to authorised subnets only.
  #   Setting public_network_access_enabled=false would also block VNet service
  #   endpoint traffic (same constraint as CKV_AZURE_101).
  - CKV_AZURE_101
  - CKV_AZURE_100
  - CKV_AZURE_132
  - CKV2_CS_AZ_039

  # ─────────────────────────────────────────────────────────────────────────
  # COMPUTE — disk encryption via Disk Encryption Set
  # ─────────────────────────────────────────────────────────────────────────
  # CKV2_CS_AZ_010  os_disk.disk_encryption_set_id (CMK via DES).
  #   Host-level encryption is enabled (encryption_at_host_enabled=true),
  #   covering temporary disks and host caches with platform-managed keys.
  #   A Disk Encryption Set for CMK requires a dedicated Key Vault key and
  #   DES resource provisioned outside this module; deferred to production.
  - CKV2_CS_AZ_010

  # ─────────────────────────────────────────────────────────────────────────
  # CONTAINER INSTANCE — CMK
  # ─────────────────────────────────────────────────────────────────────────
  # CKV_AZURE_235  Customer-Managed Key encryption on Container Group.
  #   ACI encrypts container data at rest with Microsoft-managed keys by
  #   default. CMK for ACI requires Dedicated host group integration, not
  #   available in the Serverless (shared) tier used here.
  - CKV_AZURE_235

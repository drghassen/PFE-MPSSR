# CloudSentinel Checkov Configuration (Enterprise)
#
# Objective:
# - Parse Terraform/Kubernetes with Checkov
# - Load CloudSentinel custom policies
# - Keep IaC scope only (Docker checks skipped)
# Final allowlist filtering (CKV2_CS_AZ_*, CKV_AZURE_*, CKV_K8S_*) is enforced
# in run-checkov.sh for OPA-ready normalization.
# Policies are loaded from shift-left/checkov/policies
#
# NOTE:
# - We use Terraform/Kubernetes frameworks for IaC parsing.
# - We do not force a static "check" list here to avoid drift with built-in IDs.

framework:
  - terraform
  - kubernetes

output: json
quiet: true
compact: true

download-external-modules: false
soft-fail: true

# Avoid overlap with Trivy (Docker) and keep scope IaC/K8s only.
skip-check:
  - CKV_DOCKER_*
  # Student/low-budget environments may not provision DES+CMK (Key Vault + Disk Encryption Set).
  # Encryption-at-host remains enabled in IaC; CMK adoption is tracked separately.
  - CKV2_CS_AZ_010

# Allow everything else; policy-level filtering happens in run-checkov.sh

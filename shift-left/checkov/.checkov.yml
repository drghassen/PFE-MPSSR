# CloudSentinel Checkov Configuration (Enterprise)
#
# Objective:
# - Parse Terraform/Kubernetes with Checkov
# - Load CloudSentinel custom policies
# - Keep IaC scope only (Docker checks skipped)
# Final allowlist filtering (CKV2_CS_AZ_*, CKV_AZURE_*, CKV_K8S_*) is enforced
# in run-checkov.sh for OPA-ready normalization.
# Policies are loaded from shift-left/checkov/policies/azure
#
# NOTE:
# - We use Terraform/Kubernetes frameworks for IaC parsing.
# - We do not force a static "check" list here to avoid drift with built-in IDs.

framework:
  - terraform
  - kubernetes

output: json
quiet: true
compact: true

download-external-modules: false
soft-fail: true

# IMPORTANT: Do NOT add --skip-check to the checkov CLI invocation (run-checkov.sh).
# Checkov treats a CLI --skip-check as a replacement for the config-file list, not a
# merge. All skip-check entries must live here so the full list is applied atomically.

# Avoid overlap with Trivy (Docker) and keep scope IaC/K8s only.
skip-check:
  - CKV_DOCKER_*
  # Storage account name uses substr() to comply with Azure's 24-char limit.
  # Checkov's static analysis cannot evaluate the dynamic expression — false positive.
  - CKV_AZURE_43
  # Student/low-budget environments may not provision DES+CMK (Key Vault + Disk Encryption Set).
  # Encryption-at-host remains enabled in IaC; CMK adoption is tracked separately.
  - CKV2_CS_AZ_010
  # PostgreSQL geo-redundant backups require paired regions. Azure student subscriptions
  # do not support geo-redundant storage; single-zone backup is enforced instead.
  - CKV_AZURE_136
  # Key Vault network firewall / public access / private endpoint (CKV_AZURE_109,
  # CKV_AZURE_189, CKV2_AZURE_32): private endpoints require a VNet-integrated runner or
  # Express Route, neither available in a student subscription. The CI service principal
  # accesses the vault via public endpoint with RBAC; network isolation is tracked as a
  # prod hardening item.
  - CKV_AZURE_109
  - CKV_AZURE_189
  - CKV2_AZURE_32
  # NIC public IP check (CKV_AZURE_119): false positive from Checkov graph analysis.
  # public_ip_address_id is conditionally null when assign_public_ip = false (default).
  - CKV_AZURE_119
  # HTTP port 80 check (CKV_AZURE_160): false positive. The dynamic security_rule for
  # port 80 is only created when allow_http_inbound = true (default: false).
  - CKV_AZURE_160
  # PostgreSQL overly permissive network (CKV2_AZURE_26): false positive.
  # The firewall rule 0.0.0.0/0.0.0.0 is Azure's special notation meaning
  # "allow Azure-internal services only" — it does NOT open the server to the internet.
  - CKV2_AZURE_26
  # PostgreSQL Flexible Server private endpoint (CKV2_AZURE_57): same constraint as
  # Key Vault above — no private endpoint available in student subscription.
  - CKV2_AZURE_57
  # Storage public network access (CKV_AZURE_59): storage module uses service endpoints
  # with default_action=Deny network rules, restricting access to specific VNet subnets only.
  # This is functionally equivalent to private endpoint isolation for this lab scope.
  - CKV_AZURE_59
  # Storage Customer Managed Key (CKV2_AZURE_1): CMK requires a dedicated Key Vault key +
  # managed identity chain with RBAC wiring. Microsoft-managed keys with
  # infrastructure_encryption_enabled=true are used instead. CMK is a prod hardening item.
  - CKV2_AZURE_1
  # Storage private endpoint (CKV2_AZURE_33): service endpoints are used with deny-all
  # network rules. Private endpoints would require a dedicated subnet + DNS zone per service,
  # which exceeds the complexity budget for this dev lab.
  - CKV2_AZURE_33
  # Storage Shared Key authorization (CKV2_AZURE_40): shared_access_key_enabled=true is
  # required for the VM boot_diagnostics_storage_uri. Azure AD auth is set as default
  # (default_to_oauth_authentication=true); shared key is not exposed in application code.
  - CKV2_AZURE_40

# Allow everything else; policy-level filtering happens in run-checkov.sh

# ============================================================================
# CloudSentinel - Drift Engine (Shift-Right) - Scheduled pipeline
# ============================================================================
# Architecture:
# detect -> decide -> route/remediate -> verify -> escalate
# Shift-Right runs against already-deployed Azure resources. Pipeline red/green
# alone does not change cloud state, so findings are routed to actions instead
# of immediate blanket blocking. Escalation is reserved for unresolved critical
# risk after remediation verification.
#
# Phase 2 roadmap:
# - Implement real Cloud Custodian execution in `custodian-autofix`.
# - Implement post-remediation targeted re-scan in `verify-remediation`.
# - Keep all findings uploaded to DefectDojo for audit traceability.
#
default:
  tags:
    - cloudsentinel
    - docker

# Optional CI variable for enterprise PKI:
# CLOUDSENTINEL_CUSTOM_CA_PEM_B64 -> base64 PEM chain used to trust private DefectDojo TLS certs.

stages:
  - drift
  - decide
  - remediate
  - verify
  - escalate

drift-detect:
  stage: drift
  # Run the Drift Engine directly (no Docker-in-Docker, no image build).
  image:
    # Digest pinned to current build. Update after each rebuild via:
    # docker inspect registry.../drift-engine:latest --format '{{index .RepoDigests 0}}'
    name: registry.gitlab.com/drghassen/pfe-cloud-sentinel/drift-engine@sha256:cbaa06f8a3180c429dde6e835b174b114e3c1b9ed9d75531ec25f9e34d7544b3
    entrypoint: [""]
  before_script: []
  variables:
    GIT_STRATEGY: fetch
    TF_WORKING_DIR: "${CI_PROJECT_DIR}/infra/envs/dev"
    DRIFT_OUTPUT_PATH: "${CI_PROJECT_DIR}/shift-right/drift-engine/output/drift-report.json"
    TF_PLUGIN_CACHE_DIR: "${CI_PROJECT_DIR}/.cloudsentinel/tf-plugin-cache"
    # Upload to DefectDojo is handled by dedicated job `upload-drift-to-defectdojo`.
    DRIFT_PUSH_TO_DEFECTDOJO: "false"
    OPA_ENABLED: "false"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  script:
    - set -euo pipefail
    - bash ci/scripts/shift-right/drift-detect.sh
  cache:
    key: shift-right-drift-tf-plugin-cache
    paths:
      - .cloudsentinel/tf-plugin-cache/
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - shift-right/drift-engine/output/drift-report.json
      - .cloudsentinel/drift_engine.env
      - .cloudsentinel/drift_exceptions.json
      - .cloudsentinel/drift_detect_audit.jsonl
    reports:
      dotenv: .cloudsentinel/drift_engine.env

prowler-detect:
  stage: drift
  image:
    # Digest pinned to manual build. Update after each rebuild:
    # docker inspect registry.../prowler-tools:latest --format '{{index .RepoDigests 0}}'
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/prowler-tools@sha256:25eb1d5758e3bc3b34dd29adfa9abcc08adb415f6fec054c754953b9043462c3"
    entrypoint: [""]
  before_script: []
  variables:
    GIT_STRATEGY: fetch
    # Auth mode — only sp-env is permitted in CI (enforced by azure-auth-context.sh).
    # OIDC migration: switch to `oidc` once GitLab Workload Identity Federation is provisioned.
    PROWLER_AZURE_AUTH_MODE: "sp-env"
    # Variable contract (must be defined as masked project-level CI/CD variables):
    #   ARM_CLIENT_ID     → normalized to AZURE_CLIENT_ID  by azure-auth-context.sh
    #   ARM_TENANT_ID     → normalized to AZURE_TENANT_ID  by azure-auth-context.sh
    #   ARM_CLIENT_SECRET → normalized to AZURE_CLIENT_SECRET by azure-auth-context.sh
    PROWLER_AZURE_SUBSCRIPTION_IDS: "${ARM_SUBSCRIPTION_ID}"
    PROWLER_OUTPUT_DIR: "${CI_PROJECT_DIR}/.cloudsentinel/prowler/output"
    PROWLER_REPORT_PATH: "${CI_PROJECT_DIR}/shift-right/prowler/output/prowler-report.json"
    PROWLER_IGNORE_EXIT_CODE_3: "true"
    PROWLER_OUTPUT_FORMATS: "csv json-ocsf html"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  script:
    - set -euo pipefail
    - bash ci/scripts/shift-right/prowler-detect.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - shift-right/prowler/output/prowler-report.json
      - .cloudsentinel/prowler/output/
      - .cloudsentinel/prowler_engine.env
      - .cloudsentinel/prowler_exceptions.json
      - .cloudsentinel/prowler_detect_audit.jsonl
    reports:
      dotenv: .cloudsentinel/prowler_engine.env

opa-drift-decision:
  stage: decide
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:5b4b32a09590aa257ef3a15649ad2282e5d8ca1f64e537b9c2fc93cd03e70a3d"
    entrypoint: [""]
  before_script: []
  needs:
    - job: drift-detect
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  script:
    - set -euo pipefail
    - bash ci/scripts/shift-right/opa-drift-decision.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/opa_drift_decision.json
      - .cloudsentinel/opa_drift.env
      - .cloudsentinel/drift_opa_input.json
      - .cloudsentinel/opa_drift_server.log
      - .cloudsentinel/opa_drift_audit.jsonl
    reports:
      dotenv: .cloudsentinel/opa_drift.env

opa-prowler-decision:
  stage: decide
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:5b4b32a09590aa257ef3a15649ad2282e5d8ca1f64e537b9c2fc93cd03e70a3d"
    entrypoint: [""]
  before_script: []
  needs:
    - job: prowler-detect
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  script:
    - set -euo pipefail
    - bash ci/scripts/shift-right/opa-prowler-decision.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/opa_prowler_decision.json
      - .cloudsentinel/opa_prowler.env
      - .cloudsentinel/prowler_opa_input.json
      - .cloudsentinel/opa_prowler_server.log
      - .cloudsentinel/opa_prowler_audit.jsonl
    reports:
      dotenv: .cloudsentinel/opa_prowler.env

upload-drift-to-defectdojo:
  stage: remediate
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:60e7d40113a4f5c118473ce15a36ef7728dcc69bb73fc0d558935270bd508e2b"
  before_script: []
  needs:
    - job: drift-detect
      artifacts: true
    - job: opa-drift-decision
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  script:
    - set -euo pipefail
    - bash ci/scripts/shift-right/upload-drift-to-defectdojo.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/drift_generic_findings.json
      - .cloudsentinel/dojo-responses/
      - .cloudsentinel/upload_drift_audit.jsonl

upload-prowler-to-defectdojo:
  stage: remediate
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:60e7d40113a4f5c118473ce15a36ef7728dcc69bb73fc0d558935270bd508e2b"

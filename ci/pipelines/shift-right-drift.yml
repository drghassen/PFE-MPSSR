    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  script:
    - set -euo pipefail
    - bash ci/scripts/shift-right/alert-critical.sh
  allow_failure: true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/alert_critical_audit.jsonl


# ============================================================================
# CloudSentinel - Drift Engine (Shift-Right) - Scheduled pipeline the drift engine v8 2 turbo in gitlab register container
# ============================================================================
default:
  tags:
    - cloudsentinel
    - docker

stages:
  - drift
  - decide
  - report
  - remediate

drift-detect:
  stage: drift
  # Run the Drift Engine directly (no Docker-in-Docker, no image build).
  image:
    # Digest pinned to current build. Update after each rebuild via:
    # docker inspect registry.../drift-engine:latest --format '{{index .RepoDigests 0}}'
    name: registry.gitlab.com/drghassen/pfe-cloud-sentinel/drift-engine@sha256:ce0558fad56843b9e47c9a829ce5074ea12a93c3540eda95532ec594dfdfe1e4
    entrypoint: [""]
  before_script: []
  variables:
    GIT_STRATEGY: fetch
    TF_WORKING_DIR: "${CI_PROJECT_DIR}/infra/envs/dev"
    DRIFT_OUTPUT_PATH: "${CI_PROJECT_DIR}/shift-right/drift-engine/output/drift-report.json"
    TF_PLUGIN_CACHE_DIR: "${CI_PROJECT_DIR}/.cloudsentinel/tf-plugin-cache"
    # Upload to DefectDojo is handled by dedicated job `upload-drift-to-defectdojo`.
    DRIFT_PUSH_TO_DEFECTDOJO: "false"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  script:
    - set -euo pipefail
    - mkdir -p shift-right/drift-engine/output .cloudsentinel "${TF_PLUGIN_CACHE_DIR}"
    - export TF_VAR_subscription_id="${TF_VAR_subscription_id:-${ARM_SUBSCRIPTION_ID}}"
    - set +e
    - python /app/drift-engine.py --config /app/config/drift_config.yaml
    - rc="$?"
    - set -e
    - echo "DRIFT_ENGINE_EXIT_CODE=${rc}" > .cloudsentinel/drift_engine.env
    - if [ "${rc}" -eq 2 ]; then echo "DRIFT_DETECTED=true" >> .cloudsentinel/drift_engine.env; else echo "DRIFT_DETECTED=false" >> .cloudsentinel/drift_engine.env; fi
    - |
      if ! python shift-right/scripts/fetch_drift_exceptions.py \
        --output .cloudsentinel/drift_exceptions.json \
        --environment "${DRIFT_ENVIRONMENT:-${CI_ENVIRONMENT_NAME:-production}}"; then
        if [ "${CLOUDSENTINEL_FAIL_CLOSED:-true}" = "true" ]; then
          echo "[drift-detect][ERROR] Drift exceptions fetch failed and CLOUDSENTINEL_FAIL_CLOSED=true. Halting pipeline." >&2
          exit 1
        else
          echo "[drift-detect][WARN] Drift exceptions fetch failed. Using DEGRADED exception set."
          printf '%s\n' '{"cloudsentinel":{"drift_exceptions":{"schema_version":"1.0.0","generated_at":"2099-01-01T00:00:00Z","environment":"production","source":"ci-fallback","meta":{"mode":"DEGRADED","reason":"defectdojo_unreachable","component":"drift-engine"},"exceptions":[]}}}' > .cloudsentinel/drift_exceptions.json
        fi
      fi
    - test -f shift-right/drift-engine/output/drift-report.json
    - if [ "${rc}" -eq 1 ]; then exit 1; fi
    - exit 0
  cache:
    key: shift-right-drift-tf-plugin-cache
    paths:
      - .cloudsentinel/tf-plugin-cache/
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - shift-right/drift-engine/output/drift-report.json
      - .cloudsentinel/drift_engine.env
      - .cloudsentinel/drift_exceptions.json
    reports:
      dotenv: .cloudsentinel/drift_engine.env

opa-drift-decision:
  stage: decide
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:5b4b32a09590aa257ef3a15649ad2282e5d8ca1f64e537b9c2fc93cd03e70a3d"
    entrypoint: [""]
  before_script: []
  needs:
    - job: drift-detect
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  script:
    - set -euo pipefail
    - bash ci/scripts/shift-right/opa-drift-decision.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/opa_drift_decision.json
      - .cloudsentinel/opa_drift.env
      - .cloudsentinel/drift_opa_input.json
      - .cloudsentinel/opa_drift_server.log
    reports:
      dotenv: .cloudsentinel/opa_drift.env

upload-drift-to-defectdojo:
  stage: report
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:60e7d40113a4f5c118473ce15a36ef7728dcc69bb73fc0d558935270bd508e2b"
  before_script: []
  needs:
    - job: drift-detect
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  script:
    - set -euo pipefail
    - bash ci/scripts/shift-right/upload-drift-to-defectdojo.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/drift_generic_findings.json
      - .cloudsentinel/dojo-responses/
  allow_failure: true

# Placeholder: Cloud Custodian is the only remediation engine.
# Trigger only when OPA effective violations require remediation.
custodian-remediate:
  stage: remediate
  image: alpine:3.20
  before_script: []
  needs:
    - job: opa-drift-decision
      artifacts: true
    - job: drift-detect
      artifacts: true
    - job: upload-drift-to-defectdojo
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  script:
    - |
      set -euo pipefail
      echo "DRIFT_ENGINE_EXIT_CODE=${DRIFT_ENGINE_EXIT_CODE:-}"
      echo "OPA_DRIFT_BLOCK=${OPA_DRIFT_BLOCK:-false}"
      echo "OPA_EFFECTIVE_VIOLATIONS=${OPA_EFFECTIVE_VIOLATIONS:-0}"
      echo "OPA_ACTIONABLE_EFFECTIVE_VIOLATIONS=${OPA_ACTIONABLE_EFFECTIVE_VIOLATIONS:-0}"
      if [ "${OPA_DRIFT_BLOCK:-false}" != "true" ]; then
        echo "OPA decision: no actionable drift -> skip remediation"
        exit 0
      fi
      echo "OPA decision: remediation required"
      echo "Custodian policies to apply: ${OPA_CUSTODIAN_POLICIES:-<none>}"
      echo "Trigger Cloud Custodian remediation here"

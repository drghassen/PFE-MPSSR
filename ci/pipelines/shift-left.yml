# ============================================================================
# CloudSentinel - GitLab CI/CD (Shift-Left)
# Shift-Left scanners are advisory only. OPA is the single ALLOW/DENY gate.
# ============================================================================
##
default:
  tags:
    - cloudsentinel
    - docker

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "1"
  TOFU_VERSION: "1.8.8"
  TOFU_LINUX_AMD64_ZIP_SHA256: "9e889633bc177b1d266552658020fe8ceb839445fcac82aaa7622952fd9c81bb"
  GITLEAKS_VERSION: "8.21.2"
  CHECKOV_VERSION: "3.2.502"
  TRIVY_VERSION: "0.69.3"
  TRIVY_DB_TIMEOUT: "15m"
  TRIVY_DB_REPOSITORIES: "ghcr.io/aquasecurity/trivy-db:2,mirror.gcr.io/aquasec/trivy-db:2"
  TRIVY_DB_ATTEMPTS_PER_REPO: "2"
  TRIVY_DB_RETRY_BACKOFF_SEC: "5"
  OPA_VERSION: "1.13.1"
  JSONSCHEMA_VERSION: "4.25.1"
  TRIVY_IMAGE_MIN_REPORTS: "0"

  # Comma-separated list of container image references to scan for CVE + misconfigs.
  # Set in GitLab CI/CD Settings → Variables (masked if credentials are embedded).
  # Example: registry.gitlab.com/org/project/scan-tools:latest,python:3.12-alpine
  # Leave empty to skip image scanning (filesystem scan always runs).
  TRIVY_IMAGE_TARGETS: ""

  CRITICAL_MAX: "0"
  HIGH_MAX: "5"

  # ── Security governance variables (must be set in GitLab CI/CD Settings) ──
  # CLOUDSENTINEL_APPSEC_USERS: "user1,user2"  # comma-separated GitLab usernames
  #   authorized to modify security policies. If unset, policies-immutability
  #   job will fail with exit 2. Set in: Settings → CI/CD → Variables (masked).
  # CLOUDSENTINEL_CUSTOM_CA_PEM_B64: base64 PEM chain for enterprise/internal CAs.
  #   Used to trust private DefectDojo TLS certificates in non-root CI containers.

stages:
  - guard
  - scan
  - normalize
  - contract
  - decide
  - report
  - deploy
  - maintenance

.default_tools: &default_tools
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:8bfa00f85e78a7b288b39f444ca32bd4e300e3b861bf6c171af8ec0cecd4e323"
  before_script: []

policies-immutability:
  <<: *default_tools
  stage: guard
  variables:
    GIT_DEPTH: "0"
  script:
    - bash ci/scripts/shift-left/policies-immutability.sh
  allow_failure: false
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/audit/policies-immutability_audit.json
      - .cloudsentinel/audit/policies-immutability_audit.json.hmac

trivy-db-warm:
  <<: *default_tools
  stage: guard
  cache:
    key: "trivy-db-${CI_PROJECT_ID}-${TRIVY_VERSION}-2"
    policy: pull-push
    paths:
      - .trivy-cache
  script:
    - bash ci/scripts/shift-left/trivy-db-warm.sh
  allow_failure: false
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/audit/trivy-db-warm_audit.json
      - .cloudsentinel/audit/trivy-db-warm_audit.json.hmac

gitleaks-scan:
  <<: *default_tools
  stage: scan
  variables:
    GIT_DEPTH: "0"
  script:
    - bash ci/scripts/shift-left/gitleaks-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/gitleaks_raw.json
      - .cloudsentinel/gitleaks_raw.json.hmac
      - .cloudsentinel/gitleaks_range_raw.json
      - .cloudsentinel/gitleaks_range_raw.json.hmac
      - .cloudsentinel/audit/gitleaks-scan_audit.json
      - .cloudsentinel/audit/gitleaks-scan_audit.json.hmac

checkov-scan:
  <<: *default_tools
  stage: scan
  script:
    - bash ci/scripts/shift-left/checkov-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/checkov_raw.json
      - .cloudsentinel/checkov_raw.json.hmac
      - .cloudsentinel/checkov_scan.log
      - .cloudsentinel/audit/checkov-scan_audit.json
      - .cloudsentinel/audit/checkov-scan_audit.json.hmac

trivy-scan:
  <<: *default_tools
  stage: scan
  # Single Trivy job — filesystem CVE-only + container image scanning (if TRIVY_IMAGE_TARGETS set)
  # DB is pre-warmed by trivy-db-warm (guard stage) and handed over through
  # the runner cache. Do not publish trivy.db as an artifact: it is ~1GB and
  # makes the guard stage slower than the scan. IaC misconfigs → Checkov.
  needs:
    - job: trivy-db-warm
      artifacts: false
  variables:
    TRIVY_SKIP_DB_UPDATE_IN_SCAN: "true"
  cache:
    key: "trivy-db-${CI_PROJECT_ID}-${TRIVY_VERSION}-2"
    policy: pull
    paths:
      - .trivy-cache
  script:
    - bash ci/scripts/shift-left/trivy-fs-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/trivy-fs-raw.json
      - shift-left/trivy/reports/raw/trivy-fs-raw.json.hmac
      - shift-left/trivy/reports/raw/image/
      - shift-left/trivy/reports/sbom/trivy-fs.cdx.json
      # trivy-image.cdx.json exists only when TRIVY_IMAGE_TARGETS is set — GitLab skips silently if absent
      - shift-left/trivy/reports/sbom/trivy-image.cdx.json
      - .cloudsentinel/audit/trivy-scan_audit.json
      - .cloudsentinel/audit/trivy-scan_audit.json.hmac

cloudinit-scan:
  <<: *default_tools
  stage: scan
  script:
    - bash ci/scripts/shift-left/cloudinit-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/cloudinit_analysis.json
      - .cloudsentinel/cloudinit_analysis.json.hmac
      - .cloudsentinel/audit/cloudinit-scan_audit.json
      - .cloudsentinel/audit/cloudinit-scan_audit.json.hmac

normalize-reports:
  <<: *default_tools
  stage: normalize
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-scan
      artifacts: true
    - job: cloudinit-scan
      artifacts: true
  script:
    - bash ci/scripts/shift-left/normalize-reports.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/golden_report.json
      - .cloudsentinel/golden_report.json.hmac
      - .cloudsentinel/exceptions.json
      - .cloudsentinel/dropped_exceptions.json
      - .cloudsentinel/audit_events.jsonl
      - .cloudsentinel/artifact_contract_report.json
      - .cloudsentinel/audit/normalize-reports_audit.json
      - .cloudsentinel/audit/normalize-reports_audit.json.hmac

contract-test:
  <<: *default_tools
  stage: contract
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-scan
      artifacts: true
    - job: cloudinit-scan
      artifacts: true
    - job: normalize-reports
      artifacts: true
  script:
    - bash ci/scripts/shift-left/contract-test.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/artifact_contract_report.json
      - .cloudsentinel/audit/contract-test_audit.json
      - .cloudsentinel/audit/contract-test_audit.json.hmac

opa-unit-tests:
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:5b4b32a09590aa257ef3a15649ad2282e5d8ca1f64e537b9c2fc93cd03e70a3d"
    entrypoint: [""]
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - source ci/scripts/shift-left/audit-utils.sh
    - trap 'cloudsentinel_finalize_audit "$?" "opa-unit-tests" "contract" "opa-tests"' EXIT
    - echo "[opa-unit-tests] Policy integrity — DB_PORTS vs db_ports (Python/Rego drift guard)"
    - bash ci/scripts/shift-left/verify-db-ports-sync.sh
    - echo "[opa-unit-tests] opa check + gate/drift/system split tests + cross-ref guard"
    - bash ci/scripts/shift-left/verify-opa-architecture.sh
    - echo "[opa-unit-tests] All tests passed"
  allow_failure: false
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/audit/opa-unit-tests_audit.json
      - .cloudsentinel/audit/opa-unit-tests_audit.json.hmac

opa-decision:
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:5b4b32a09590aa257ef3a15649ad2282e5d8ca1f64e537b9c2fc93cd03e70a3d"
    entrypoint: [""]
  stage: decide
  needs:
    - job: normalize-reports
      artifacts: true
    - job: contract-test
    - job: opa-unit-tests
  script:
    - bash ci/scripts/shift-left/opa-decision.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/opa_decision.json
      - .cloudsentinel/opa_decision.json.hmac
      - .cloudsentinel/decision_audit_events.jsonl
      - .cloudsentinel/audit_events.jsonl
      - .cloudsentinel/audit/opa-decision_audit.json
      - .cloudsentinel/audit/opa-decision_audit.json.hmac

upload-to-defectdojo:
  stage: report
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:8bfa00f85e78a7b288b39f444ca32bd4e300e3b861bf6c171af8ec0cecd4e323"
  timeout: 5 minutes
  retry: 2
  allow_failure: true
  variables:
    GIT_STRATEGY: fetch
  # Report upload consumes scanner raw artifacts from detection jobs and the
  # normalized golden report from normalize-reports. Raw artifacts are not
  # republished by normalize-reports to keep artifact ownership explicit.
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-scan
      artifacts: true
    - job: cloudinit-scan
      artifacts: true
    - job: normalize-reports
      artifacts: true
  script:
    - bash ci/scripts/shift-left/upload-to-defectdojo.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/dojo-responses/
      - .cloudsentinel/audit/upload-to-defectdojo_audit.json
      - .cloudsentinel/audit/upload-to-defectdojo_audit.json.hmac
  when: always

deploy-infrastructure:
  # Digest pinned to current production build. Update after each rebuild via:
  # docker inspect registry.gitlab.com/.../deploy-tools:latest --format '{{index .RepoDigests 0}}'
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/deploy-tools@sha256:dc56369d20c03f05a46ad8b8b8b4f1f65e07d0ab491231a4b2244bdd9eb547a2"
  before_script: []
  stage: deploy
  # Distributed artifact integrity model:
  # deploy verifies OPA decision artifact + HMAC locally before apply.
  needs:
    - job: opa-decision
      artifacts: true
  script:
    - bash ci/scripts/shift-left/deploy-infrastructure.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/terraform_outputs_dev.json
      - infra/azure/envs/dev/tfplan
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(main|develop)$/'
trigger-deploy-tools-rebuild:
  stage: maintenance
  needs: []
  trigger:
    include: .gitlab-ci-image-factory.yml
    strategy: depend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - ci/images/deploy-tools/Dockerfile

trigger-custodian-tools-rebuild:
  stage: maintenance
  needs: []
  trigger:
    include: .gitlab-ci-image-factory.yml
    strategy: depend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - ci/images/custodian-tools/Dockerfile

# ============================================================================
# CloudSentinel - GitLab CI/CD (Shift-Left)
# Shift-Left scanners are advisory only. OPA is the single ALLOW/DENY gate.
# ============================================================================
##
default:
  tags:
    - cloudsentinel
    - docker

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "1"
  TOFU_VERSION: "1.8.8"
  TOFU_LINUX_AMD64_ZIP_SHA256: "9e889633bc177b1d266552658020fe8ceb839445fcac82aaa7622952fd9c81bb"
  GITLEAKS_VERSION: "8.21.2"
  CHECKOV_VERSION: "3.2.502"
  TRIVY_VERSION: "0.69.3"
  TRIVY_DB_TIMEOUT: "15m"
  TRIVY_DB_REPOSITORIES: "ghcr.io/aquasecurity/trivy-db:2,mirror.gcr.io/aquasec/trivy-db:2"
  TRIVY_DB_ATTEMPTS_PER_REPO: "2"
  TRIVY_DB_RETRY_BACKOFF_SEC: "5"
  OPA_VERSION: "1.13.1"
  JSONSCHEMA_VERSION: "4.25.1"
  TRIVY_IMAGE_MIN_REPORTS: "0"

  CRITICAL_MAX: "0"
  HIGH_MAX: "5"
  RETRY_GUARD_MAX_RETRIES: "1"
  RETRY_GUARD_MIN_INTERVAL_SEC: "10"

  # ── Security governance variables (must be set in GitLab CI/CD Settings) ──
  # CLOUDSENTINEL_APPSEC_USERS: "user1,user2"  # comma-separated GitLab usernames
  #   authorized to modify security policies. If unset, policies-immutability
  #   job will fail with exit 2. Set in: Settings → CI/CD → Variables (masked).

stages:
  - guard
  - scan
  - normalize
  - contract
  - decide
  - report
  - deploy
  - maintenance

.default_tools: &default_tools
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:60e7d40113a4f5c118473ce15a36ef7728dcc69bb73fc0d558935270bd508e2b"
  before_script: []

.trivy_cache_pull: &trivy_cache_pull
  cache:
    key: "trivy-db-${CI_PROJECT_ID}-${TRIVY_VERSION}"
    policy: pull
    paths:
      - .trivy-cache

.trivy_cache_pull_push: &trivy_cache_pull_push
  cache:
    key: "trivy-db-${CI_PROJECT_ID}-${TRIVY_VERSION}"
    policy: pull-push
    paths:
      - .trivy-cache

retry-guard:
  <<: *default_tools
  stage: guard
  script:
    - bash ci/scripts/shift-left/retry-guard.sh
  allow_failure: false

policies-immutability:
  <<: *default_tools
  stage: guard
  script:
    - bash ci/scripts/shift-left/policies-immutability.sh
  allow_failure: false

trivy-db-warm:
  <<: *default_tools
  stage: guard
  cache:
    key: "trivy-db-${CI_PROJECT_ID}-${TRIVY_VERSION}"
    policy: pull-push
    paths:
      - .trivy-cache
  script:
    - bash ci/scripts/shift-left/trivy-db-warm.sh
  allow_failure: false


gitleaks-scan:
  <<: *default_tools
  stage: scan
  variables:
    GIT_DEPTH: "0"
  script:
    - bash ci/scripts/shift-left/gitleaks-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/gitleaks_raw.json
      - .cloudsentinel/gitleaks_range_raw.json

checkov-scan:
  <<: *default_tools
  stage: scan
  script:
    - bash ci/scripts/shift-left/checkov-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/checkov_raw.json
      - .cloudsentinel/checkov_scan.log

trivy-fs-scan:
  <<: [*default_tools, *trivy_cache_pull_push]
  stage: scan
  script:
    - bash ci/scripts/shift-left/trivy-fs-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/trivy-fs-raw.json
      - shift-left/trivy/reports/sbom/trivy-fs.cdx.json

trivy-config-scan:
  <<: [*default_tools, *trivy_cache_pull]
  stage: scan
  script:
    - bash ci/scripts/shift-left/trivy-config-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/trivy-config-raw.json

cloudinit-scan:
  <<: *default_tools
  stage: scan
  script:
    - python3 shift-left/cloudinit-scanner/cloudinit_scan.py --terraform-dir . --output .cloudsentinel/cloudinit_analysis.json --default-env "${CI_ENVIRONMENT_NAME:-dev}"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/cloudinit_analysis.json

normalize-reports:
  <<: *default_tools
  stage: normalize
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-fs-scan
      artifacts: true
    - job: trivy-config-scan
      artifacts: true
    - job: cloudinit-scan
      artifacts: true
  script:
    - bash ci/scripts/shift-left/normalize-reports.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/golden_report.json
      - .cloudsentinel/golden_report.json.hmac
      - .cloudsentinel/gitleaks_raw.json
      - .cloudsentinel/checkov_raw.json
      - .cloudsentinel/checkov_scan.log
      - .cloudsentinel/cloudinit_analysis.json
      - shift-left/trivy/reports/raw/trivy-fs-raw.json
      - shift-left/trivy/reports/raw/trivy-config-raw.json
      - .cloudsentinel/exceptions.json
      - .cloudsentinel/dropped_exceptions.json
      - .cloudsentinel/audit_events.jsonl

contract-test:
  <<: *default_tools
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - bash ci/scripts/shift-left/contract-test.sh

opa-image-smoke:
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:5b4b32a09590aa257ef3a15649ad2282e5d8ca1f64e537b9c2fc93cd03e70a3d"
    entrypoint: [""]
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - bash ci/scripts/shift-left/opa-image-smoke.sh
  artifacts:
    when: on_failure
    expire_in: 7 days
    paths:
      - .cloudsentinel/opa-image-smoke.log

opa-unit-tests:
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:5b4b32a09590aa257ef3a15649ad2282e5d8ca1f64e537b9c2fc93cd03e70a3d"
    entrypoint: [""]
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - echo "[opa-unit-tests] Policy integrity — DB_PORTS vs db_ports (Python/Rego drift guard)"
    - bash ci/scripts/shift-left/verify-db-ports-sync.sh
    - echo "[opa-unit-tests] opa check + gate/drift/system split tests + cross-ref guard"
    - bash ci/scripts/shift-left/verify-opa-architecture.sh
    - echo "[opa-unit-tests] All tests passed"
  allow_failure: false

opa-decision:
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:5b4b32a09590aa257ef3a15649ad2282e5d8ca1f64e537b9c2fc93cd03e70a3d"
    entrypoint: [""]
  stage: decide
  needs:
    - job: normalize-reports
      artifacts: true
    - job: contract-test
    - job: opa-image-smoke
    - job: opa-unit-tests
  script:
    - bash ci/scripts/shift-left/opa-decision.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/opa_decision.json
      - .cloudsentinel/decision_audit_events.jsonl
      - .cloudsentinel/audit_events.jsonl

upload-to-defectdojo:
  stage: report
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:60e7d40113a4f5c118473ce15a36ef7728dcc69bb73fc0d558935270bd508e2b"
  timeout: 5 minutes
  retry: 2
  allow_failure: true
  variables:
    GIT_STRATEGY: fetch
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-fs-scan
      artifacts: true
    - job: trivy-config-scan
      artifacts: true
    - job: cloudinit-scan
      artifacts: true
    - job: normalize-reports
      artifacts: true
  script:
    - bash ci/scripts/shift-left/upload-to-defectdojo.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/dojo-responses/
  when: always

deploy-infrastructure:
  # Digest pinned to current production build. Update after each rebuild via:
  # docker inspect registry.gitlab.com/.../deploy-tools:latest --format '{{index .RepoDigests 0}}'
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/deploy-tools@sha256:dc56369d20c03f05a46ad8b8b8b4f1f65e07d0ab491231a4b2244bdd9eb547a2"
  before_script: []
  stage: deploy
  needs:
    - job: opa-decision
      artifacts: true
  script:
    - bash ci/scripts/shift-left/deploy-infrastructure.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/terraform_outputs_dev.json
      - infra/envs/dev/tfplan
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(main|develop)$/'
trigger-deploy-tools-rebuild:
  stage: maintenance
  needs: []
  trigger:
    include: .gitlab-ci-image-factory.yml
    strategy: depend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - ci/images/deploy-tools/Dockerfile

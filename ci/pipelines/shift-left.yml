# ============================================================================
# CloudSentinel - GitLab CI/CD (Shift-Left)
# Shift-Left scanners are advisory only. OPA is the single ALLOW/DENY gate.
# ============================================================================
##
default:
  tags:
    - cloudsentinel
    - docker

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  TOFU_VERSION: "1.8.8"
  TOFU_LINUX_AMD64_ZIP_SHA256: "9e889633bc177b1d266552658020fe8ceb839445fcac82aaa7622952fd9c81bb"
  GITLEAKS_VERSION: "8.21.2"
  CHECKOV_VERSION: "3.2.502"
  TRIVY_VERSION: "0.69.1"
  OPA_VERSION: "1.13.1"
  JSONSCHEMA_VERSION: "4.25.1"

  CRITICAL_MAX: "0"
  HIGH_MAX: "2"
  RETRY_GUARD_MAX_RETRIES: "3"
  RETRY_GUARD_MIN_INTERVAL_SEC: "120"

stages:
  - guard
  - scan
  - normalize
  - contract
  - decide
  - report
  - deploy

.default_tools: &default_tools
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:f2f6762e13c9517cc6c06cb1f632bed665761df7756c9b1ff6cc4204bee68cce"
  before_script: []

.trivy_cache_pull: &trivy_cache_pull
  cache:
    key: "trivy-db-${CI_PROJECT_ID}-${TRIVY_VERSION}"
    policy: pull
    paths:
      - .trivy-cache

.trivy_cache_pull_push: &trivy_cache_pull_push
  cache:
    key: "trivy-db-${CI_PROJECT_ID}-${TRIVY_VERSION}"
    policy: pull-push
    paths:
      - .trivy-cache

retry-guard:
  <<: *default_tools
  stage: guard
  script:
    - bash ci/scripts/retry-guard.sh
  allow_failure: false

policies-immutability:
  <<: *default_tools
  stage: guard
  script:
    - bash ci/scripts/policies-immutability.sh
  allow_failure: false


gitleaks-scan:
  <<: *default_tools
  stage: scan
  script:
    - bash ci/scripts/gitleaks-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/gitleaks_raw.json
      - .cloudsentinel/gitleaks_range_raw.json

checkov-scan:
  <<: *default_tools
  stage: scan
  script:
    - bash ci/scripts/checkov-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/checkov_raw.json
      - .cloudsentinel/checkov_scan.log

trivy-fs-scan:
  <<: [*default_tools, *trivy_cache_pull_push]
  stage: scan
  script:
    - bash ci/scripts/trivy-fs-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/trivy-fs-raw.json
      - shift-left/trivy/reports/sbom/trivy-fs.cdx.json

trivy-config-scan:
  <<: [*default_tools, *trivy_cache_pull]
  stage: scan
  script:
    - bash ci/scripts/trivy-config-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/trivy-config-raw.json

trivy-image-scan-scan-tools:
  <<: [*default_tools, *trivy_cache_pull]
  stage: scan
  variables:
    TRIVY_IMAGE_TARGET: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:f2f6762e13c9517cc6c06cb1f632bed665761df7756c9b1ff6cc4204bee68cce"
    TRIVY_IMAGE_REPORT_NAME: "scan-tools"
  script:
    - bash ci/scripts/trivy-image-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/image/trivy-image-scan-tools-raw.json

trivy-image-scan-deploy-tools:
  <<: [*default_tools, *trivy_cache_pull]
  stage: scan
  variables:
    # TODO(security): Mettre à jour ce digest après chaque rebuild de deploy-tools.
    # Commande : docker inspect registry.gitlab.com/.../deploy-tools:latest --format '{{index .RepoDigests 0}}'
    # ou via GitLab Registry UI → Tags → Digest
    TRIVY_IMAGE_TARGET: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/deploy-tools@sha256:f3339bbe02957bac271e7b415f8c8c172fb76b77d19ea1ccaa99d819eacd68be"
    TRIVY_IMAGE_REPORT_NAME: "deploy-tools"
  script:
    - bash ci/scripts/trivy-image-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/image/trivy-image-deploy-tools-raw.json

trivy-image-scan-opa:
  <<: [*default_tools, *trivy_cache_pull]
  stage: scan
  variables:
    TRIVY_IMAGE_TARGET: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:740ebf73adc25cd85b2a08615666b4e728812c0cc487760c6953ffe675ca78cd"
    TRIVY_IMAGE_REPORT_NAME: "opa"
  script:
    - bash ci/scripts/trivy-image-scan.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - shift-left/trivy/reports/raw/image/trivy-image-opa-raw.json

normalize-reports:
  <<: *default_tools
  stage: normalize
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-fs-scan
      artifacts: true
    - job: trivy-config-scan
      artifacts: true
    - job: trivy-image-scan-scan-tools
      artifacts: true
    - job: trivy-image-scan-deploy-tools
      artifacts: true
    - job: trivy-image-scan-opa
      artifacts: true
  script:
    - bash ci/scripts/normalize-reports.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/golden_report.json
      - .cloudsentinel/gitleaks_raw.json
      - .cloudsentinel/checkov_raw.json
      - .cloudsentinel/checkov_scan.log
      - shift-left/trivy/reports/raw/trivy-fs-raw.json
      - shift-left/trivy/reports/raw/trivy-config-raw.json
      - shift-left/trivy/reports/raw/image/
      - .cloudsentinel/exceptions.json
      - .cloudsentinel/dropped_exceptions.json
      - .cloudsentinel/audit_events.jsonl

contract-test:
  <<: *default_tools
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - bash ci/scripts/contract-test.sh

opa-image-smoke:
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:740ebf73adc25cd85b2a08615666b4e728812c0cc487760c6953ffe675ca78cd"
    entrypoint: [""]
  stage: contract
  needs:
    - job: normalize-reports
      artifacts: true
  script:
    - bash ci/scripts/opa-image-smoke.sh
  artifacts:
    when: on_failure
    expire_in: 7 days
    paths:
      - .cloudsentinel/opa-image-smoke.log

opa-decision:
  image:
    name: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/opa@sha256:740ebf73adc25cd85b2a08615666b4e728812c0cc487760c6953ffe675ca78cd"
    entrypoint: [""]
  stage: decide
  needs:
    - job: normalize-reports
      artifacts: true
    - job: contract-test
    - job: opa-image-smoke
  script:
    - bash ci/scripts/opa-decision.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/opa_decision.json
      - .cloudsentinel/decision_audit_events.jsonl
      - .cloudsentinel/audit_events.jsonl

upload-to-defectdojo:
  stage: report
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/scan-tools@sha256:f2f6762e13c9517cc6c06cb1f632bed665761df7756c9b1ff6cc4204bee68cce"
  retry: 2
  allow_failure: true
  variables:
    GIT_STRATEGY: fetch
  needs:
    - job: gitleaks-scan
      artifacts: true
    - job: checkov-scan
      artifacts: true
    - job: trivy-fs-scan
      artifacts: true
    - job: trivy-image-scan-scan-tools
      artifacts: true
    - job: trivy-image-scan-deploy-tools
      artifacts: true
    - job: trivy-image-scan-opa
      artifacts: true
  script:
    - bash ci/scripts/upload-to-defectdojo.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cloudsentinel/dojo-responses/
  when: always

deploy-infrastructure:
  # TODO(security): Mettre à jour ce digest après chaque rebuild de deploy-tools.
  # Le digest hardcodé garantit l'immutabilité de l'image utilisée en production.
  # Après rebuild → récupérer le nouveau sha256 dans GitLab Registry et l'appliquer ici.
  image: "registry.gitlab.com/drghassen/pfe-cloud-sentinel/deploy-tools@sha256:f3339bbe02957bac271e7b415f8c8c172fb76b77d19ea1ccaa99d819eacd68be"
  before_script: []
  stage: deploy
  needs:
    - job: opa-decision
      artifacts: true
  script:
    - bash ci/scripts/deploy-infrastructure.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .cloudsentinel/terraform_outputs_student_secure.json
      - infra/azure/student-secure/tfplan
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(main|develop)$/'


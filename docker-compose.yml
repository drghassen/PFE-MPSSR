services:

  opa-server:
    image: ${OPA_SERVER_IMAGE:-openpolicyagent/opa:1.13.1-static}
    container_name: cloudsentinel-opa-server
    entrypoint: ["/opa"]
    ports:
      - "127.0.0.1:8181:8181"
    volumes:
      - ./policies/opa/gate:/app/policies/gate:ro
      - ./policies/opa/system/authz.rego:/app/policies/system/authz.rego:ro
      - ./.cloudsentinel/opa_auth_config.json:/app/auth/opa_config.json:ro
      - ./.cloudsentinel:/app/data:ro
    command:
      - run
      - --server
      - --addr=127.0.0.1:8181
      - --authentication=token
      - --authorization=basic
      - --log-level=info
      - --log-format=json
      - --set=decision_logs.console=true
      - --watch
      - /app/policies/gate
      - /app/policies/system/authz.rego
      - /app/data/exceptions.json
      - /app/auth/opa_config.json
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped
    labels:
      cloudsentinel.component: "pdp"
      cloudsentinel.role: "policy-decision-point-shiftleft"
      cloudsentinel.opa.bundle: "cloudsentinel-shiftleft"

  opa-server-shiftright:
    image: ${OPA_SERVER_IMAGE:-openpolicyagent/opa:1.13.1-static}
    container_name: cloudsentinel-opa-server-shiftright
    entrypoint: ["/opa"]
    ports:
      - "127.0.0.1:8182:8182"
    volumes:
      - ./policies/opa/drift:/app/policies/drift:ro
      - ./policies/opa/system/authz.rego:/app/policies/system/authz.rego:ro
      - ./.cloudsentinel/opa_auth_config.json:/app/auth/opa_config.json:ro
      - ./.cloudsentinel/drift_exceptions.json:/app/data/drift_exceptions.json:ro
    command:
      - run
      - --server
      - --addr=127.0.0.1:8182
      - --authentication=token
      - --authorization=basic
      - --log-level=info
      - --log-format=json
      - --set=decision_logs.console=true
      - --watch
      - /app/policies/drift
      - /app/policies/system/authz.rego
      - /app/data/drift_exceptions.json
      - /app/auth/opa_config.json
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8182/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped
    labels:
      cloudsentinel.component: "pdp"
      cloudsentinel.role: "policy-decision-point-shiftright"
      cloudsentinel.opa.bundle: "cloudsentinel-shiftright"
